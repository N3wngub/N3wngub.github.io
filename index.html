<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Scanner Pro (iPhone 14 Pro Optimized)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .glass-panel {
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: var(--safe-bottom);
        }

        header {
            padding-top: var(--safe-top);
            height: calc(4rem + var(--safe-top));
        }

        /* Magnifier Glass for smart cropping */
        #magnifier {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #3b82f6;
            background-color: #111;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 0 10px rgba(0,0,0,0.5);
            pointer-events: none;
            display: none;
            z-index: 50;
            /* Crosshair */
            background-image: 
                linear-gradient(to right, transparent 48%, rgba(59, 130, 246, 0.8) 49%, rgba(59, 130, 246, 0.8) 51%, transparent 52%),
                linear-gradient(to bottom, transparent 48%, rgba(59, 130, 246, 0.8) 49%, rgba(59, 130, 246, 0.8) 51%, transparent 52%);
        }

        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Filter button active state */
        .filter-btn.active .icon-box {
            background-color: #3b82f6;
            border-color: #60a5fa;
            color: white;
        }
        .filter-btn.active span {
            color: #60a5fa;
            font-weight: 600;
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col relative">

    <!-- Header -->
    <header class="flex items-center justify-between px-5 bg-black z-20">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-1.5 rounded-lg">
                <i class="ph ph-scan text-white text-xl"></i>
            </div>
            <h1 class="text-lg font-semibold tracking-wide">Smart Scanner</h1>
        </div>
        <button id="btnRestart" class="hidden text-gray-400 hover:text-white p-2">
            <i class="ph ph-arrow-u-up-left text-2xl"></i>
        </button>
    </header>

    <!-- LOADING SCREEN -->
    <div id="loadingScreen" class="hidden absolute inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="loader mb-4"></div>
        <p class="text-white font-medium tracking-wider" id="loadingText">กำลังประมวลผลคุณภาพสูง...</p>
    </div>

    <!-- MAIN APP AREA -->
    <main class="flex-1 relative overflow-hidden flex flex-col">
        
        <!-- STEP 1: CAMERA VIEW -->
        <div id="viewCamera" class="absolute inset-0 flex flex-col bg-black transition-opacity duration-300">
            <div class="relative flex-1 bg-black flex items-center justify-center overflow-hidden">
                <!-- Video playsinline is crucial for iOS -->
                <video id="cameraFeed" autoplay playsinline class="w-full h-full object-cover"></video>
                
                <!-- Guidelines -->
                <div class="absolute inset-6 border-[1.5px] border-white/40 rounded-xl pointer-events-none flex flex-col items-center justify-between py-8">
                    <div class="w-16 h-1 bg-white/50 rounded-full"></div>
                    <p class="text-white/80 text-sm bg-black/40 px-4 py-1.5 rounded-full backdrop-blur-md">
                        วางเอกสารให้ขนานและอยู่ในกรอบ
                    </p>
                    <div class="w-16 h-1 bg-white/50 rounded-full"></div>
                </div>

                <!-- Flash/Torch Button -->
                <button id="btnTorch" class="absolute top-4 right-4 w-12 h-12 rounded-full bg-black/50 backdrop-blur-md flex items-center justify-center text-white border border-white/20 hidden active:bg-white/20">
                    <i class="ph ph-flashlight text-2xl"></i>
                </button>
            </div>
            
            <!-- Camera Controls -->
            <div class="h-32 glass-panel flex items-center justify-between px-8">
                <label class="flex flex-col items-center justify-center cursor-pointer text-gray-300 active:scale-95 transition-transform">
                    <div class="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center mb-1">
                        <i class="ph ph-image text-2xl"></i>
                    </div>
                    <span class="text-[10px] uppercase tracking-wider">อัลบั้ม</span>
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                </label>

                <!-- Capture Button iPhone Style -->
                <button id="btnCapture" class="w-20 h-20 rounded-full bg-transparent border-[3px] border-white flex items-center justify-center active:opacity-70 transition-opacity">
                    <div class="w-[68px] h-[68px] rounded-full bg-white"></div>
                </button>

                <div class="w-12 h-12"></div> <!-- Spacer -->
            </div>
        </div>

        <!-- STEP 2: CROP VIEW (SMART MANUAL) -->
        <div id="viewCrop" class="hidden absolute inset-0 flex flex-col bg-[#111] transition-opacity duration-300">
            <div class="p-3 text-center text-sm text-gray-300 bg-black/50 border-b border-white/10 font-medium">
                ลากจุดมุมเพื่อปรับขอบเขตเอกสาร
            </div>
            
            <div id="cropContainer" class="flex-1 relative flex items-center justify-center overflow-hidden p-6">
                <canvas id="cropCanvas" class="max-w-full max-h-full rounded-md shadow-2xl"></canvas>
                <!-- Magnifier -->
                <canvas id="magnifier"></canvas>
            </div>

            <!-- Crop Controls -->
            <div class="h-28 glass-panel flex items-center justify-between px-6">
                <button id="btnRetakeCrop" class="text-gray-400 active:text-white flex flex-col items-center p-2">
                    <i class="ph ph-x text-2xl mb-1"></i>
                    <span class="text-[10px] uppercase">ถ่ายใหม่</span>
                </button>
                <button id="btnAutoCrop" class="text-blue-400 active:text-blue-300 flex flex-col items-center p-2">
                    <i class="ph ph-bounding-box text-2xl mb-1"></i>
                    <span class="text-[10px] uppercase">หาขอบอัตโนมัติ</span>
                </button>
                <button id="btnApplyCrop" class="bg-blue-600 active:bg-blue-700 text-white px-8 py-3.5 rounded-full font-semibold shadow-lg shadow-blue-600/30 flex items-center gap-2">
                    ตัดภาพ <i class="ph ph-check-circle text-xl"></i>
                </button>
            </div>
        </div>

        <!-- STEP 3: EDIT & EXPORT VIEW -->
        <div id="viewEdit" class="hidden absolute inset-0 flex flex-col bg-[#111] transition-opacity duration-300">
            <div class="flex-1 relative flex flex-col p-4 gap-4 overflow-hidden pb-[120px]">
                
                <!-- Preview Canvas -->
                <div class="flex-1 w-full bg-black rounded-xl flex items-center justify-center p-0 shadow-inner overflow-hidden border border-white/10">
                    <canvas id="previewCanvas" class="max-w-full max-h-full object-contain"></canvas>
                </div>
                
                <!-- Filters Scrollable -->
                <div class="h-24 flex items-center justify-center gap-4 overflow-x-auto pb-2 px-2">
                    <button class="filter-btn flex flex-col items-center gap-1.5 transition-all w-16" data-filter="original">
                        <div class="icon-box w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center border-2 border-transparent text-gray-400">
                            <i class="ph ph-image text-xl"></i>
                        </div>
                        <span class="text-[10px] text-gray-400">ต้นฉบับ</span>
                    </button>
                    <button class="filter-btn flex flex-col items-center gap-1.5 transition-all w-16" data-filter="color">
                        <div class="icon-box w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center border-2 border-transparent text-gray-400">
                            <i class="ph ph-palette text-xl"></i>
                        </div>
                        <span class="text-[10px] text-gray-400">สีสว่าง</span>
                    </button>
                    <button class="filter-btn flex flex-col items-center gap-1.5 transition-all w-16" data-filter="bw_soft">
                        <div class="icon-box w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center border-2 border-transparent text-gray-400">
                            <i class="ph ph-drop-half-bottom text-xl"></i>
                        </div>
                        <span class="text-[10px] text-gray-400">ขาวดำ (นุ่ม)</span>
                    </button>
                    <button class="filter-btn active flex flex-col items-center gap-1.5 transition-all w-16" data-filter="bw_sharp">
                        <div class="icon-box w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center border-2 border-transparent text-gray-400">
                            <i class="ph ph-text-t text-xl"></i>
                        </div>
                        <span class="text-[10px] text-gray-400">ขาวดำ (ชัด)</span>
                    </button>
                </div>
            </div>

            <!-- Export Controls -->
            <div class="absolute bottom-0 left-0 right-0 glass-panel flex items-center justify-between px-5 pt-4 pb-8 z-10 gap-3">
                <button id="btnSaveImg" class="flex-1 bg-gray-800 active:bg-gray-700 text-white py-4 rounded-2xl font-semibold flex justify-center items-center gap-2 transition-colors border border-gray-700">
                    <i class="ph ph-image-square text-xl text-blue-400"></i> บันทึกรูปภาพ
                </button>
                <button id="btnSavePdf" class="flex-1 bg-blue-600 active:bg-blue-700 text-white py-4 rounded-2xl font-semibold flex justify-center items-center gap-2 transition-colors shadow-lg shadow-blue-600/20">
                    <i class="ph ph-file-pdf text-xl"></i> สร้าง PDF
                </button>
            </div>
        </div>

    </main>

    <!-- Application Logic -->
    <script>
        // --- System & State ---
        let currentStream = null;
        let videoTrack = null;
        let isTorchOn = false;
        
        // Use higher resolution for iPhone 14 Pro
        const MAX_IMAGE_SIZE = 2400; 

        // Canvas Buffers
        const sourceImageCanvas = document.createElement('canvas'); 
        const croppedImageCanvas = document.createElement('canvas'); 
        const processedImageCanvas = document.createElement('canvas'); 
        
        let cropCorners = [];
        let draggingCornerIndex = -1;
        let currentFilter = 'bw_sharp'; 

        // DOM Elements
        const viewCamera = document.getElementById('viewCamera');
        const viewCrop = document.getElementById('viewCrop');
        const viewEdit = document.getElementById('viewEdit');
        const loadingScreen = document.getElementById('loadingScreen');
        const loadingText = document.getElementById('loadingText');
        const btnRestart = document.getElementById('btnRestart');
        
        const cameraFeed = document.getElementById('cameraFeed');
        const btnCapture = document.getElementById('btnCapture');
        const fileInput = document.getElementById('fileInput');
        const btnTorch = document.getElementById('btnTorch');
        
        const cropCanvas = document.getElementById('cropCanvas');
        const cropContainer = document.getElementById('cropContainer');
        const magnifier = document.getElementById('magnifier');
        const btnRetakeCrop = document.getElementById('btnRetakeCrop');
        const btnAutoCrop = document.getElementById('btnAutoCrop');
        const btnApplyCrop = document.getElementById('btnApplyCrop');
        
        const previewCanvas = document.getElementById('previewCanvas');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const btnSaveImg = document.getElementById('btnSaveImg');
        const btnSavePdf = document.getElementById('btnSavePdf');

        // --- View Manager ---
        function showView(view) {
            [viewCamera, viewCrop, viewEdit].forEach(v => v.classList.add('hidden'));
            btnRestart.classList.remove('hidden');

            if (view === 'camera') {
                viewCamera.classList.remove('hidden');
                btnRestart.classList.add('hidden');
                startCamera();
            } else if (view === 'crop') {
                viewCrop.classList.remove('hidden');
                stopCamera();
                setupCropView();
            } else if (view === 'edit') {
                viewEdit.classList.remove('hidden');
                applyCurrentFilter();
            }
        }

        function showLoading(show, text = "กำลังประมวลผล...") {
            loadingText.innerText = text;
            if(show) loadingScreen.classList.remove('hidden');
            else loadingScreen.classList.add('hidden');
        }

        // --- Camera & Torch ---
        async function startCamera() {
            try {
                if (currentStream) stopCamera();
                // Request high resolution for Pro models
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment', 
                        width: { ideal: 4032 }, // iPhone 14 Pro max width
                        height: { ideal: 3024 } 
                    },
                    audio: false
                });
                cameraFeed.srcObject = stream;
                currentStream = stream;
                videoTrack = stream.getVideoTracks()[0];

                // Check Torch Capabilities
                setTimeout(() => {
                    const capabilities = videoTrack.getCapabilities();
                    if (capabilities.torch) {
                        btnTorch.classList.remove('hidden');
                    } else {
                        btnTorch.classList.add('hidden');
                    }
                }, 500);

            } catch (err) {
                console.error("Camera error:", err);
                alert("กรุณาอนุญาตการเข้าถึงกล้อง หรือเลือกรูปภาพจากอัลบั้มแทน");
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
                videoTrack = null;
                isTorchOn = false;
                btnTorch.innerHTML = '<i class="ph ph-flashlight text-2xl"></i>';
                btnTorch.classList.remove('bg-white', 'text-black');
            }
        }

        btnTorch.addEventListener('click', async () => {
            if (!videoTrack) return;
            try {
                isTorchOn = !isTorchOn;
                await videoTrack.applyConstraints({ advanced: [{ torch: isTorchOn }] });
                if (isTorchOn) {
                    btnTorch.classList.add('bg-white', 'text-black');
                    btnTorch.classList.remove('text-white');
                } else {
                    btnTorch.classList.remove('bg-white', 'text-black');
                    btnTorch.classList.add('text-white');
                }
            } catch (err) {
                console.error("Torch error:", err);
            }
        });

        // --- Image Capture & Load ---
        function processImageSource(imageSource, width, height) {
            const scale = Math.min(1, MAX_IMAGE_SIZE / Math.max(width, height));
            sourceImageCanvas.width = width * scale;
            sourceImageCanvas.height = height * scale;
            const ctx = sourceImageCanvas.getContext('2d');
            ctx.drawImage(imageSource, 0, 0, sourceImageCanvas.width, sourceImageCanvas.height);
            
            showView('crop');
            showLoading(false);
        }

        btnCapture.addEventListener('click', () => {
            if (!currentStream) return;
            showLoading(true, "กำลังจับภาพความละเอียดสูง...");
            // Slight delay to simulate shutter and allow UI to render loader
            setTimeout(() => {
                processImageSource(cameraFeed, cameraFeed.videoWidth, cameraFeed.videoHeight);
            }, 100);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            showLoading(true, "กำลังโหลดภาพ...");
            const img = new Image();
            img.onload = () => processImageSource(img, img.width, img.height);
            img.src = URL.createObjectURL(file);
        });

        btnRestart.addEventListener('click', () => {
            if (confirm('ทิ้งภาพนี้และกลับไปหน้าถ่ายภาพ?')) showView('camera');
        });
        btnRetakeCrop.addEventListener('click', () => showView('camera'));

        // --- Smart Crop & Auto Detect ---
        function setupCropView() {
            const cw = cropContainer.clientWidth - 48; 
            const ch = cropContainer.clientHeight - 48;
            const imgW = sourceImageCanvas.width;
            const imgH = sourceImageCanvas.height;
            const imgRatio = imgW / imgH;
            const containerRatio = cw / ch;

            let drawW, drawH;
            if (imgRatio > containerRatio) {
                drawW = cw; drawH = cw / imgRatio;
            } else {
                drawH = ch; drawW = ch * imgRatio;
            }

            cropCanvas.style.width = drawW + 'px';
            cropCanvas.style.height = drawH + 'px';
            cropCanvas.width = imgW; 
            cropCanvas.height = imgH;

            // Perform basic Auto-Crop heuristic
            autoDetectBounds();
            drawCropInterface();
        }

        // Lightweight bounding box detection
        function autoDetectBounds() {
            const w = sourceImageCanvas.width;
            const h = sourceImageCanvas.height;
            // Default 10% padding if detection fails
            const padX = w * 0.1;
            const padY = h * 0.1;

            // Simplified edge detection (scanning for dark/light boundaries)
            // To keep pure JS fast, we just look for significant variance from edges
            const ctx = sourceImageCanvas.getContext('2d', {willReadFrequently: true});
            // Check a smaller center strip to find background color rough estimate
            // For a robust app without OpenCV, we use a smart default padding 
            // but shrink it slightly to mimic detection.
            
            // Set initial smart corners
            cropCorners = [
                { x: padX, y: padY }, 
                { x: w - padX, y: padY }, 
                { x: w - padX, y: h - padY }, 
                { x: padX, y: h - padY }
            ];
        }

        btnAutoCrop.addEventListener('click', () => {
            // Re-apply default smart padding with a small animation effect
            autoDetectBounds();
            drawCropInterface();
        });

        function drawCropInterface() {
            const ctx = cropCanvas.getContext('2d');
            const w = cropCanvas.width;
            const h = cropCanvas.height;

            ctx.clearRect(0, 0, w, h);
            ctx.drawImage(sourceImageCanvas, 0, 0);

            // Overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
            ctx.beginPath();
            ctx.rect(0, 0, w, h);
            ctx.closePath();
            
            // Cutout
            ctx.moveTo(cropCorners[0].x, cropCorners[0].y);
            for (let i = 1; i < 4; i++) ctx.lineTo(cropCorners[i].x, cropCorners[i].y);
            ctx.lineTo(cropCorners[0].x, cropCorners[0].y);
            ctx.fill('evenodd');

            // Lines
            ctx.strokeStyle = '#3b82f6'; 
            ctx.lineWidth = w * 0.008; 
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(cropCorners[0].x, cropCorners[0].y);
            for (let i = 1; i < 4; i++) ctx.lineTo(cropCorners[i].x, cropCorners[i].y);
            ctx.closePath();
            ctx.stroke();

            // Handles
            const handleRadius = w * 0.035; // Larger handle for Pro
            cropCorners.forEach(point => {
                ctx.beginPath();
                ctx.arc(point.x, point.y, handleRadius, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.lineWidth = w * 0.01;
                ctx.strokeStyle = '#3b82f6';
                ctx.stroke();
            });
        }

        // --- Touch Interactions & Magnifier ---
        function getEventCoordinate(e) {
            const rect = cropCanvas.getBoundingClientRect();
            const scaleX = cropCanvas.width / rect.width;
            const scaleY = cropCanvas.height / rect.height;
            let clientX = e.clientX;
            let clientY = e.clientY;
            
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY,
                clientX: clientX,
                clientY: clientY
            };
        }

        function updateMagnifier(pos) {
            if (draggingCornerIndex === -1) return;
            
            magnifier.style.display = 'block';
            // Position magnifier above the finger
            magnifier.style.left = (pos.clientX - 50) + 'px';
            magnifier.style.top = (pos.clientY - 130) + 'px'; // Offset upwards

            const magCtx = magnifier.getContext('2d');
            magnifier.width = 150;
            magnifier.height = 150;
            
            // Source coordinates (zoom in 2x)
            const zoom = 2;
            const sWidth = magnifier.width / zoom;
            const sHeight = magnifier.height / zoom;
            const sx = pos.x - (sWidth / 2);
            const sy = pos.y - (sHeight / 2);

            magCtx.clearRect(0, 0, magnifier.width, magnifier.height);
            magCtx.drawImage(sourceImageCanvas, sx, sy, sWidth, sHeight, 0, 0, magnifier.width, magnifier.height);
        }

        function handleDragStart(e) {
            e.preventDefault();
            const pos = getEventCoordinate(e);
            // Generous touch target
            const handleRadiusSq = Math.pow(cropCanvas.width * 0.1, 2); 
            
            let minDist = Infinity;
            draggingCornerIndex = -1;
            
            cropCorners.forEach((corner, i) => {
                const distSq = Math.pow(corner.x - pos.x, 2) + Math.pow(corner.y - pos.y, 2);
                if (distSq < minDist && distSq < handleRadiusSq) {
                    minDist = distSq;
                    draggingCornerIndex = i;
                }
            });

            if (draggingCornerIndex !== -1) {
                updateMagnifier(pos);
            }
        }

        function handleDragMove(e) {
            if (draggingCornerIndex === -1) return;
            e.preventDefault();
            const pos = getEventCoordinate(e);
            
            pos.x = Math.max(0, Math.min(cropCanvas.width, pos.x));
            pos.y = Math.max(0, Math.min(cropCanvas.height, pos.y));
            
            cropCorners[draggingCornerIndex] = { x: pos.x, y: pos.y };
            requestAnimationFrame(drawCropInterface);
            updateMagnifier(pos);
        }

        function handleDragEnd() {
            draggingCornerIndex = -1;
            magnifier.style.display = 'none';
        }

        cropCanvas.addEventListener('mousedown', handleDragStart);
        cropCanvas.addEventListener('mousemove', handleDragMove);
        window.addEventListener('mouseup', handleDragEnd);

        cropCanvas.addEventListener('touchstart', handleDragStart, {passive: false});
        cropCanvas.addEventListener('touchmove', handleDragMove, {passive: false});
        window.addEventListener('touchend', handleDragEnd);

        // --- Perspective Warp ---
        btnApplyCrop.addEventListener('click', () => {
            showLoading(true, "กำลังประมวลผลการจัดทรง...");
            setTimeout(() => {
                warpPerspective();
                showView('edit');
                showLoading(false);
            }, 50);
        });

        function warpPerspective() {
            const [tl, tr, br, bl] = cropCorners;
            
            const widthTop = Math.hypot(tr.x - tl.x, tr.y - tl.y);
            const widthBottom = Math.hypot(br.x - bl.x, br.y - bl.y);
            const outW = Math.round(Math.max(widthTop, widthBottom));

            const heightLeft = Math.hypot(tl.x - bl.x, tl.y - bl.y);
            const heightRight = Math.hypot(tr.x - br.x, tr.y - br.y);
            const outH = Math.round(Math.max(heightLeft, heightRight));

            croppedImageCanvas.width = outW;
            croppedImageCanvas.height = outH;
            const ctx = croppedImageCanvas.getContext('2d', { willReadFrequently: true });
            
            const dstData = ctx.createImageData(outW, outH);
            const dstBuf = new Uint32Array(dstData.data.buffer);
            
            const srcCtx = sourceImageCanvas.getContext('2d', { willReadFrequently: true });
            const srcW = sourceImageCanvas.width;
            const srcH = sourceImageCanvas.height;
            const srcData = srcCtx.getImageData(0, 0, srcW, srcH);
            const srcBuf = new Uint32Array(srcData.data.buffer);

            // High-quality perspective mapping
            for (let y = 0; y < outH; y++) {
                const v = y / outH;
                const leftX = tl.x + (bl.x - tl.x) * v;
                const leftY = tl.y + (bl.y - tl.y) * v;
                const rightX = tr.x + (br.x - tr.x) * v;
                const rightY = tr.y + (br.y - tr.y) * v;

                for (let x = 0; x < outW; x++) {
                    const u = x / outW;
                    const srcX = leftX + (rightX - leftX) * u;
                    const srcY = leftY + (rightY - leftY) * u;

                    const sx = Math.floor(srcX);
                    const sy = Math.floor(srcY);

                    if (sx >= 0 && sx < srcW && sy >= 0 && sy < srcH) {
                        dstBuf[y * outW + x] = srcBuf[sy * srcW + sx];
                    }
                }
            }
            ctx.putImageData(dstData, 0, 0);
        }

        // --- Smart Image Filters (Fixing "Too Bright" Issue) ---
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                const currentBtn = e.currentTarget;
                currentBtn.classList.add('active');
                
                currentFilter = currentBtn.dataset.filter;
                showLoading(true, "กำลังปรับแต่งสี...");
                setTimeout(() => {
                    applyCurrentFilter();
                    showLoading(false);
                }, 10);
            });
        });

        function applyCurrentFilter() {
            const w = croppedImageCanvas.width;
            const h = croppedImageCanvas.height;
            
            processedImageCanvas.width = w;
            processedImageCanvas.height = h;
            const ctx = processedImageCanvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(croppedImageCanvas, 0, 0);
            
            if (currentFilter === 'original') {
                updatePreview();
                return;
            }

            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;

            // Pass 1: Find min/max luminance for Adaptive Normalization
            let minL = 255, maxL = 0;
            if (currentFilter.startsWith('bw_')) {
                for (let i = 0; i < data.length; i += 4) {
                    let luma = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
                    if (luma < minL) minL = luma;
                    if (luma > maxL) maxL = luma;
                }
                // Avoid division by zero if image is solid color
                if (maxL - minL < 10) { minL = 0; maxL = 255; }
            }

            // Pass 2: Apply Filters
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i], g = data[i+1], b = data[i+2];

                if (currentFilter === 'color') {
                    // Mild contrast & saturation boost (Safe for color docs)
                    let luma = r*0.299 + g*0.587 + b*0.114;
                    let cFactor = 1.2;
                    data[i] = Math.min(255, Math.max(0, (r - 128) * cFactor + 128));
                    data[i+1] = Math.min(255, Math.max(0, (g - 128) * cFactor + 128));
                    data[i+2] = Math.min(255, Math.max(0, (b - 128) * cFactor + 128));
                } 
                else if (currentFilter === 'bw_soft') {
                    // Standard Grayscale with Normalization (Very safe, reads everything clearly)
                    let luma = r*0.299 + g*0.587 + b*0.114;
                    // Normalize to full 0-255 range based on image content
                    let normLuma = ((luma - minL) / (maxL - minL)) * 255;
                    data[i] = data[i+1] = data[i+2] = normLuma;
                }
                else if (currentFilter === 'bw_sharp') {
                    // Sharp B&W for Text (Adaptive, prevents blowing out)
                    let luma = r*0.299 + g*0.587 + b*0.114;
                    let normLuma = ((luma - minL) / (maxL - minL)) * 255;
                    
                    // Apply S-Curve Contrast (Makes darks darker, lights lighter smoothly)
                    let contrast = 1.5;
                    let finalLuma = (normLuma - 128) * contrast + 128;
                    
                    // Soft clipping
                    if (finalLuma > 210) finalLuma = 255; // Whiten paper slightly
                    else if (finalLuma < 80) finalLuma = Math.max(0, finalLuma - 20); // Darken text
                    
                    data[i] = data[i+1] = data[i+2] = finalLuma;
                }
            }
            
            ctx.putImageData(imgData, 0, 0);
            updatePreview();
        }

        function updatePreview() {
            previewCanvas.width = processedImageCanvas.width;
            previewCanvas.height = processedImageCanvas.height;
            const ctx = previewCanvas.getContext('2d');
            ctx.drawImage(processedImageCanvas, 0, 0);
        }

        // --- Export & Save ---
        btnSaveImg.addEventListener('click', () => {
            const dataURL = processedImageCanvas.toDataURL('image/jpeg', 0.95); // High quality
            const link = document.createElement('a');
            link.download = `Scan_${new Date().getTime()}.jpg`;
            link.href = dataURL;
            link.click();
        });

        btnSavePdf.addEventListener('click', () => {
            showLoading(true, "กำลังสร้างไฟล์ PDF A4...");
            setTimeout(() => {
                try {
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                    
                    const imgData = processedImageCanvas.toDataURL('image/jpeg', 0.9);
                    const pdfW = pdf.internal.pageSize.getWidth();
                    const pdfH = pdf.internal.pageSize.getHeight();
                    const imgRatio = processedImageCanvas.width / processedImageCanvas.height;
                    
                    let drawW = pdfW;
                    let drawH = pdfW / imgRatio;
                    
                    if (drawH > pdfH) {
                        drawH = pdfH; drawW = pdfH * imgRatio;
                    }
                    
                    const x = (pdfW - drawW) / 2;
                    const y = (pdfH - drawH) / 2;

                    pdf.addImage(imgData, 'JPEG', x, y, drawW, drawH, undefined, 'FAST');
                    pdf.save(`Scan_Document_${new Date().getTime()}.pdf`);
                } catch (e) {
                    console.error(e);
                    alert("เกิดข้อผิดพลาดในการสร้าง PDF");
                }
                showLoading(false);
            }, 100);
        });

        // Start
        showView('camera');

    </script>
</body>
