<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แอปสแกนเอกสารอัจฉริยะ (Smart Doc Scanner)</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111827; /* Dark background for professional feel */
            color: #ffffff;
            overflow: hidden; /* Prevent scrolling, act like an app */
            touch-action: none; /* Prevent pull-to-refresh on mobile */
        }
        
        .glass-panel {
            background: rgba(31, 41, 55, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Hide scrollbars but keep functionality if needed */
        ::-webkit-scrollbar { display: none; }
        
        #cropCanvas {
            touch-action: none; /* Crucial for custom dragging */
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="w-screen h-screen flex flex-col relative">

    <!-- Header -->
    <header class="h-16 flex items-center justify-between px-4 bg-gray-900 border-b border-gray-800 z-20">
        <div class="flex items-center gap-2">
            <i class="ph ph-scan text-blue-500 text-2xl"></i>
            <h1 class="text-lg font-bold">แอปสแกนเอกสาร</h1>
        </div>
        <button id="btnRestart" class="hidden text-gray-400 hover:text-white p-2">
            <i class="ph ph-arrow-counter-clockwise text-xl"></i>
        </button>
    </header>

    <!-- LOADING SCREEN -->
    <div id="loadingScreen" class="hidden absolute inset-0 bg-gray-900 z-50 flex flex-col items-center justify-center">
        <div class="loader mb-4"></div>
        <p class="text-gray-300">กำลังประมวลผล...</p>
    </div>

    <!-- MAIN APP AREA -->
    <main class="flex-1 relative overflow-hidden flex flex-col">
        
        <!-- STEP 1: CAMERA / UPLOAD VIEW -->
        <div id="viewCamera" class="absolute inset-0 flex flex-col bg-black transition-opacity duration-300">
            <div class="relative flex-1 bg-black flex items-center justify-center overflow-hidden">
                <video id="cameraFeed" autoplay playsinline class="w-full h-full object-cover"></video>
                <!-- Scanner overlay guide -->
                <div class="absolute inset-4 border-2 border-white/30 rounded-lg pointer-events-none flex items-center justify-center">
                    <p class="text-white/50 text-sm bg-black/50 px-3 py-1 rounded-full">จัดวางเอกสารให้อยู่ในกรอบ</p>
                </div>
            </div>
            
            <!-- Camera Controls -->
            <div class="h-32 glass-panel flex items-center justify-around px-6">
                <!-- Upload Button -->
                <label class="flex flex-col items-center justify-center cursor-pointer text-gray-300 hover:text-white transition">
                    <div class="w-12 h-12 rounded-full bg-gray-800 flex items-center justify-center mb-1">
                        <i class="ph ph-image text-2xl"></i>
                    </div>
                    <span class="text-xs">เลือกรูปภาพ</span>
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                </label>

                <!-- Capture Button -->
                <button id="btnCapture" class="w-20 h-20 rounded-full bg-white border-4 border-gray-400 flex items-center justify-center active:bg-gray-200 transition-colors">
                    <div class="w-16 h-16 rounded-full border-2 border-black"></div>
                </button>

                <!-- Filler to balance layout -->
                <div class="w-12 h-12"></div>
            </div>
        </div>

        <!-- STEP 2: CROP / PERSPECTIVE VIEW -->
        <div id="viewCrop" class="hidden absolute inset-0 flex flex-col bg-gray-900 transition-opacity duration-300">
            <div class="p-4 text-center text-sm text-gray-300 bg-gray-900">
                ลากจุดทั้ง 4 มุมให้ตรงกับขอบเอกสาร
            </div>
            
            <div id="cropContainer" class="flex-1 relative flex items-center justify-center overflow-hidden bg-gray-800 p-4">
                <canvas id="cropCanvas" class="max-w-full max-h-full"></canvas>
            </div>

            <!-- Crop Controls -->
            <div class="h-24 glass-panel flex items-center justify-between px-6">
                <button id="btnRetakeCrop" class="text-gray-300 flex flex-col items-center">
                    <i class="ph ph-x text-2xl mb-1"></i>
                    <span class="text-xs">ยกเลิก</span>
                </button>
                <button id="btnApplyCrop" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-full font-semibold shadow-lg flex items-center gap-2">
                    <i class="ph ph-crop text-xl"></i> ตัดภาพ
                </button>
            </div>
        </div>

        <!-- STEP 3: PREVIEW & FILTER VIEW -->
        <div id="viewEdit" class="hidden absolute inset-0 flex flex-col bg-gray-900 transition-opacity duration-300">
            <div class="flex-1 relative flex flex-col p-4 gap-4 overflow-y-auto pb-32">
                <!-- Preview Canvas -->
                <div class="flex-1 w-full bg-gray-800 rounded-lg flex items-center justify-center p-2 shadow-inner min-h-[50vh]">
                    <canvas id="previewCanvas" class="max-w-full max-h-full object-contain shadow-md"></canvas>
                </div>
                
                <!-- Filters -->
                <div class="flex justify-center gap-4 py-2">
                    <button class="filter-btn active flex flex-col items-center gap-1 opacity-50 hover:opacity-100 transition-opacity" data-filter="original">
                        <div class="w-12 h-12 rounded-full bg-gray-700 flex items-center justify-center border-2 border-transparent">
                            <i class="ph ph-image text-xl"></i>
                        </div>
                        <span class="text-xs">ต้นฉบับ</span>
                    </button>
                    <button class="filter-btn flex flex-col items-center gap-1 opacity-50 hover:opacity-100 transition-opacity" data-filter="magic">
                        <div class="w-12 h-12 rounded-full bg-gray-700 flex items-center justify-center border-2 border-transparent">
                            <i class="ph ph-magic-wand text-xl"></i>
                        </div>
                        <span class="text-xs">สีสว่าง</span>
                    </button>
                    <button class="filter-btn flex flex-col items-center gap-1 opacity-50 hover:opacity-100 transition-opacity" data-filter="bw">
                        <div class="w-12 h-12 rounded-full bg-gray-700 flex items-center justify-center border-2 border-transparent">
                            <i class="ph ph-file-text text-xl"></i>
                        </div>
                        <span class="text-xs">ขาว-ดำ (แนะนำ)</span>
                    </button>
                </div>
            </div>

            <!-- Export Controls -->
            <div class="absolute bottom-0 left-0 right-0 h-24 glass-panel flex items-center justify-between px-6 z-10">
                <button id="btnSaveImg" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-l-full font-medium border-r border-gray-600 flex justify-center items-center gap-2 transition-colors">
                    <i class="ph ph-image-square text-lg"></i> บันทึกรูปภาพ
                </button>
                <button id="btnSavePdf" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-r-full font-medium flex justify-center items-center gap-2 transition-colors shadow-lg shadow-blue-900/50">
                    <i class="ph ph-file-pdf text-lg"></i> บันทึก PDF
                </button>
            </div>
        </div>

    </main>

    <!-- Application Logic -->
    <script>
        // --- State Variables ---
        let currentStream = null;
        let sourceImageCanvas = document.createElement('canvas'); // Holds the high-res original image
        let croppedImageCanvas = document.createElement('canvas'); // Holds the warped/cropped image
        let processedImageCanvas = document.createElement('canvas'); // Holds the final filtered image
        
        let cropCorners = [];
        let draggingCornerIndex = -1;
        let currentFilter = 'bw'; // Default to B&W document style
        const MAX_IMAGE_SIZE = 1600; // Resize large images for performance

        // --- DOM Elements ---
        const viewCamera = document.getElementById('viewCamera');
        const viewCrop = document.getElementById('viewCrop');
        const viewEdit = document.getElementById('viewEdit');
        const loadingScreen = document.getElementById('loadingScreen');
        const btnRestart = document.getElementById('btnRestart');
        
        const cameraFeed = document.getElementById('cameraFeed');
        const btnCapture = document.getElementById('btnCapture');
        const fileInput = document.getElementById('fileInput');
        
        const cropCanvas = document.getElementById('cropCanvas');
        const cropContainer = document.getElementById('cropContainer');
        const btnRetakeCrop = document.getElementById('btnRetakeCrop');
        const btnApplyCrop = document.getElementById('btnApplyCrop');
        
        const previewCanvas = document.getElementById('previewCanvas');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const btnSaveImg = document.getElementById('btnSaveImg');
        const btnSavePdf = document.getElementById('btnSavePdf');

        // --- View Management ---
        function showView(view) {
            viewCamera.classList.add('hidden');
            viewCrop.classList.add('hidden');
            viewEdit.classList.add('hidden');
            btnRestart.classList.remove('hidden');

            if (view === 'camera') {
                viewCamera.classList.remove('hidden');
                btnRestart.classList.add('hidden');
                startCamera();
            } else if (view === 'crop') {
                viewCrop.classList.remove('hidden');
                stopCamera();
                setupCropView();
            } else if (view === 'edit') {
                viewEdit.classList.remove('hidden');
                applyCurrentFilter();
            }
        }

        function showLoading(show) {
            if(show) loadingScreen.classList.remove('hidden');
            else loadingScreen.classList.add('hidden');
        }

        // --- Camera & Upload Logic ---
        async function startCamera() {
            try {
                if (currentStream) stopCamera();
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                cameraFeed.srcObject = stream;
                currentStream = stream;
            } catch (err) {
                console.error("Camera access failed:", err);
                alert("ไม่สามารถเข้าถึงกล้องได้ กรุณาใช้ปุ่ม 'เลือกรูปภาพ' แทน");
            }
        }

        function stopCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
        }

        btnCapture.addEventListener('click', () => {
            if (!currentStream) return;
            showLoading(true);
            
            // Draw video frame to source canvas
            const videoWidth = cameraFeed.videoWidth;
            const videoHeight = cameraFeed.videoHeight;
            const scale = Math.min(1, MAX_IMAGE_SIZE / Math.max(videoWidth, videoHeight));
            
            sourceImageCanvas.width = videoWidth * scale;
            sourceImageCanvas.height = videoHeight * scale;
            const ctx = sourceImageCanvas.getContext('2d');
            ctx.drawImage(cameraFeed, 0, 0, sourceImageCanvas.width, sourceImageCanvas.height);
            
            setTimeout(() => {
                showView('crop');
                showLoading(false);
            }, 100); // small delay to allow UI update
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            showLoading(true);
            const img = new Image();
            img.onload = () => {
                const scale = Math.min(1, MAX_IMAGE_SIZE / Math.max(img.width, img.height));
                sourceImageCanvas.width = img.width * scale;
                sourceImageCanvas.height = img.height * scale;
                const ctx = sourceImageCanvas.getContext('2d');
                ctx.drawImage(img, 0, 0, sourceImageCanvas.width, sourceImageCanvas.height);
                
                showView('crop');
                showLoading(false);
            };
            img.src = URL.createObjectURL(file);
        });

        btnRestart.addEventListener('click', () => {
            if (confirm('คุณต้องการยกเลิกภาพนี้และกลับไปหน้าเริ่มต้นใช่หรือไม่?')) {
                showView('camera');
            }
        });

        btnRetakeCrop.addEventListener('click', () => {
            showView('camera');
        });

        // --- Crop & Perspective Logic ---
        function setupCropView() {
            // Calculate display size for canvas
            const cw = cropContainer.clientWidth - 32; // padding
            const ch = cropContainer.clientHeight - 32;
            const imgW = sourceImageCanvas.width;
            const imgH = sourceImageCanvas.height;
            const imgRatio = imgW / imgH;
            const containerRatio = cw / ch;

            let drawW, drawH;
            if (imgRatio > containerRatio) {
                drawW = cw;
                drawH = cw / imgRatio;
            } else {
                drawH = ch;
                drawW = ch * imgRatio;
            }

            cropCanvas.style.width = drawW + 'px';
            cropCanvas.style.height = drawH + 'px';
            cropCanvas.width = imgW; // internal resolution is high
            cropCanvas.height = imgH;

            // Initialize corners (15% padding from edges)
            const padX = imgW * 0.15;
            const padY = imgH * 0.15;
            cropCorners = [
                { x: padX, y: padY }, // Top Left
                { x: imgW - padX, y: padY }, // Top Right
                { x: imgW - padX, y: imgH - padY }, // Bottom Right
                { x: padX, y: imgH - padY } // Bottom Left
            ];

            drawCropInterface();
        }

        function drawCropInterface() {
            const ctx = cropCanvas.getContext('2d');
            const w = cropCanvas.width;
            const h = cropCanvas.height;

            // Clear and draw image
            ctx.clearRect(0, 0, w, h);
            ctx.drawImage(sourceImageCanvas, 0, 0);

            // Draw darkening overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.beginPath();
            ctx.rect(0, 0, w, h);
            ctx.closePath();
            
            // Cut out the crop area
            ctx.moveTo(cropCorners[0].x, cropCorners[0].y);
            for (let i = 1; i < 4; i++) ctx.lineTo(cropCorners[i].x, cropCorners[i].y);
            ctx.lineTo(cropCorners[0].x, cropCorners[0].y);
            ctx.fill('evenodd');

            // Draw connecting lines
            ctx.strokeStyle = '#3b82f6'; // Tailwind blue-500
            ctx.lineWidth = w * 0.005; // responsive line width
            ctx.beginPath();
            ctx.moveTo(cropCorners[0].x, cropCorners[0].y);
            for (let i = 1; i < 4; i++) ctx.lineTo(cropCorners[i].x, cropCorners[i].y);
            ctx.closePath();
            ctx.stroke();

            // Draw handles
            const handleRadius = w * 0.03;
            ctx.fillStyle = '#ffffff';
            cropCorners.forEach(point => {
                ctx.beginPath();
                ctx.arc(point.x, point.y, handleRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            });
        }

        // --- Touch & Mouse Events for Cropping ---
        function getEventCoordinate(e) {
            const rect = cropCanvas.getBoundingClientRect();
            // Map CSS pixel to internal canvas pixel
            const scaleX = cropCanvas.width / rect.width;
            const scaleY = cropCanvas.height / rect.height;
            let clientX = e.clientX;
            let clientY = e.clientY;
            
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function handleDragStart(e) {
            e.preventDefault();
            const pos = getEventCoordinate(e);
            const handleRadiusSq = Math.pow(cropCanvas.width * 0.08, 2); // generous touch area
            
            // Find closest corner
            let minDist = Infinity;
            draggingCornerIndex = -1;
            
            cropCorners.forEach((corner, i) => {
                const distSq = Math.pow(corner.x - pos.x, 2) + Math.pow(corner.y - pos.y, 2);
                if (distSq < minDist && distSq < handleRadiusSq) {
                    minDist = distSq;
                    draggingCornerIndex = i;
                }
            });
        }

        function handleDragMove(e) {
            if (draggingCornerIndex === -1) return;
            e.preventDefault();
            const pos = getEventCoordinate(e);
            
            // Constrain within bounds
            pos.x = Math.max(0, Math.min(cropCanvas.width, pos.x));
            pos.y = Math.max(0, Math.min(cropCanvas.height, pos.y));
            
            cropCorners[draggingCornerIndex] = pos;
            requestAnimationFrame(drawCropInterface);
        }

        function handleDragEnd(e) {
            draggingCornerIndex = -1;
        }

        cropCanvas.addEventListener('mousedown', handleDragStart);
        cropCanvas.addEventListener('mousemove', handleDragMove);
        window.addEventListener('mouseup', handleDragEnd);

        cropCanvas.addEventListener('touchstart', handleDragStart, {passive: false});
        cropCanvas.addEventListener('touchmove', handleDragMove, {passive: false});
        window.addEventListener('touchend', handleDragEnd);


        // --- Perspective Warp Logic ---
        btnApplyCrop.addEventListener('click', () => {
            showLoading(true);
            
            // Allow UI to render loading before heavy processing
            setTimeout(() => {
                warpPerspective();
                showView('edit');
                showLoading(false);
            }, 50);
        });

        function warpPerspective() {
            const [tl, tr, br, bl] = cropCorners;
            
            // Calculate output width and height
            const widthTop = Math.hypot(tr.x - tl.x, tr.y - tl.y);
            const widthBottom = Math.hypot(br.x - bl.x, br.y - bl.y);
            const outW = Math.round(Math.max(widthTop, widthBottom));

            const heightLeft = Math.hypot(tl.x - bl.x, tl.y - bl.y);
            const heightRight = Math.hypot(tr.x - br.x, tr.y - br.y);
            const outH = Math.round(Math.max(heightLeft, heightRight));

            croppedImageCanvas.width = outW;
            croppedImageCanvas.height = outH;
            const ctx = croppedImageCanvas.getContext('2d', { willReadFrequently: true });
            
            // Create target image data
            const dstData = ctx.createImageData(outW, outH);
            const dstBuf = new Uint32Array(dstData.data.buffer);
            
            // Get source image data
            const srcCtx = sourceImageCanvas.getContext('2d', { willReadFrequently: true });
            const srcW = sourceImageCanvas.width;
            const srcH = sourceImageCanvas.height;
            const srcData = srcCtx.getImageData(0, 0, srcW, srcH);
            const srcBuf = new Uint32Array(srcData.data.buffer);

            // Bilinear interpolation mapping
            for (let y = 0; y < outH; y++) {
                const v = y / outH;
                const leftX = tl.x + (bl.x - tl.x) * v;
                const leftY = tl.y + (bl.y - tl.y) * v;
                const rightX = tr.x + (br.x - tr.x) * v;
                const rightY = tr.y + (br.y - tr.y) * v;

                for (let x = 0; x < outW; x++) {
                    const u = x / outW;
                    const srcX = leftX + (rightX - leftX) * u;
                    const srcY = leftY + (rightY - leftY) * u;

                    const sx = Math.floor(srcX);
                    const sy = Math.floor(srcY);

                    // Check bounds and copy pixel (nearest neighbor for performance)
                    if (sx >= 0 && sx < srcW && sy >= 0 && sy < srcH) {
                        dstBuf[y * outW + x] = srcBuf[sy * srcW + sx];
                    }
                }
            }
            
            ctx.putImageData(dstData, 0, 0);
        }

        // --- Image Filtering Logic (White Background / B&W) ---
        
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Update UI active state
                filterBtns.forEach(b => {
                    b.classList.remove('active', 'border-blue-500', 'opacity-100');
                    b.classList.add('border-transparent', 'opacity-50');
                    b.querySelector('div').classList.remove('border-blue-500');
                    b.querySelector('div').classList.add('border-transparent');
                });
                
                const currentBtn = e.currentTarget;
                currentBtn.classList.add('active', 'opacity-100');
                currentBtn.querySelector('div').classList.add('border-blue-500');
                currentBtn.querySelector('div').classList.remove('border-transparent');
                
                currentFilter = currentBtn.dataset.filter;
                
                showLoading(true);
                setTimeout(() => {
                    applyCurrentFilter();
                    showLoading(false);
                }, 10);
            });
        });

        // Initialize active state on default filter
        document.querySelector('[data-filter="bw"]').click();

        function applyCurrentFilter() {
            const w = croppedImageCanvas.width;
            const h = croppedImageCanvas.height;
            
            processedImageCanvas.width = w;
            processedImageCanvas.height = h;
            const ctx = processedImageCanvas.getContext('2d', { willReadFrequently: true });
            
            // Draw warped original to processed canvas
            ctx.drawImage(croppedImageCanvas, 0, 0);
            
            if (currentFilter === 'original') {
                updatePreview();
                return;
            }

            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i], g = data[i+1], b = data[i+2];

                if (currentFilter === 'bw') {
                    // Document Scan Simulation (High Contrast B&W)
                    let luma = 0.299 * r + 0.587 * g + 0.114 * b;
                    // Increase contrast aggressively
                    luma = (luma - 110) * 3.0 + 128;
                    
                    // Threshold to make background purely white and text purely black
                    if (luma > 180) luma = 255;
                    else if (luma < 70) luma = 0;
                    else luma = Math.min(255, Math.max(0, luma)); // clamp

                    data[i] = data[i+1] = data[i+2] = luma;
                } 
                else if (currentFilter === 'magic') {
                    // Magic Color (Flatten lighting, boost color)
                    let luma = 0.299 * r + 0.587 * g + 0.114 * b;
                    let diffR = r - luma, diffG = g - luma, diffB = b - luma;
                    
                    // Boost luminance contrast
                    luma = (luma - 100) * 1.5 + 128;
                    if (luma > 220) luma = 255; // whiten background
                    
                    // Add back boosted colors
                    data[i] = Math.min(255, Math.max(0, luma + diffR * 1.5));
                    data[i+1] = Math.min(255, Math.max(0, luma + diffG * 1.5));
                    data[i+2] = Math.min(255, Math.max(0, luma + diffB * 1.5));
                }
            }
            
            ctx.putImageData(imgData, 0, 0);
            updatePreview();
        }

        function updatePreview() {
            previewCanvas.width = processedImageCanvas.width;
            previewCanvas.height = processedImageCanvas.height;
            const ctx = previewCanvas.getContext('2d');
            ctx.drawImage(processedImageCanvas, 0, 0);
        }

        // --- Export Logic ---
        
        btnSaveImg.addEventListener('click', () => {
            const dataURL = processedImageCanvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            link.download = `scanned_document_${Date.now()}.jpg`;
            link.href = dataURL;
            link.click();
        });

        btnSavePdf.addEventListener('click', () => {
            showLoading(true);
            setTimeout(() => {
                try {
                    const { jsPDF } = window.jspdf;
                    
                    // Format: A4 (210x297 mm)
                    const pdf = new jsPDF({
                        orientation: 'portrait',
                        unit: 'mm',
                        format: 'a4'
                    });

                    const imgData = processedImageCanvas.toDataURL('image/jpeg', 0.8);
                    
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    
                    const imgRatio = processedImageCanvas.width / processedImageCanvas.height;
                    const pdfRatio = pdfWidth / pdfHeight;
                    
                    let drawW = pdfWidth;
                    let drawH = pdfWidth / imgRatio;
                    
                    // If height exceeds page, scale to fit height instead
                    if (drawH > pdfHeight) {
                        drawH = pdfHeight;
                        drawW = pdfHeight * imgRatio;
                    }
                    
                    // Center the image
                    const x = (pdfWidth - drawW) / 2;
                    const y = (pdfHeight - drawH) / 2;

                    pdf.addImage(imgData, 'JPEG', x, y, drawW, drawH);
                    pdf.save(`scanned_document_${Date.now()}.pdf`);
                } catch (e) {
                    console.error("PDF generation failed:", e);
                    alert("เกิดข้อผิดพลาดในการสร้าง PDF");
                }
                showLoading(false);
            }, 50);
        });

        // Initialize App
        showView('camera');

    </script>
</body>
</html>
