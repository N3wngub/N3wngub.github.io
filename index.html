<style>
:root {

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;

/* Loading */

/* Toast */
#toast {

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const MAX_DIM = 2400;
let pages = [];       // { src, cropped, processed, filter }
let activePg = 0;
// corners: 4 points in SOURCE canvas pixels [TL, TR, BR, BL]
let corners = [];
// Camera
let camStream = null, vTrack = null, torchOn = false;

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
const mkC = (w,h) => { const c=document.createElement('canvas'); c.width=w; c.height=h; return c; };
const ctx  = c => c.getContext('2d', {willReadFrequently:true});
const freeC= c => { if(c){c.width=0;c.height=0;} };
const lerp = (a,b,t) => a+(b-a)*t;
const clamp= v => Math.max(0,Math.min(255,Math.round(v)));

let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show'+(type?' '+type:'');
  clearTimeout(_tt); _tt=setTimeout(()=>el.className='',2800);
}
function setLoad(show, txt='กำลังประมวลผล...'){
  document.getElementById('ldTxt').textContent=txt;
  document.getElementById('loading').classList.toggle('hidden',!show);
}

// ═══════════════════════════════════════
//  VIEW CONTROLLER
// ═══════════════════════════════════════
function showView(name){
  ['Camera','Crop','Edit'].forEach(n=>
    document.getElementById('view'+n).classList.toggle('hidden', n.toLowerCase()!==name)
  );
  document.getElementById('restartBtn').style.display = name==='camera'?'none':'';
  updatePgCount();
  if(name==='camera') startCam();
  else                stopCam();
  if(name==='crop')   setupCrop();
  if(name==='edit')   renderEdit();
}
function doRestart(){
  pages.forEach(p=>{freeC(p.src);freeC(p.cropped);freeC(p.processed);});
  pages=[]; activePg=0; showView('camera');
}
function updatePgCount(){
  const el=document.getElementById('pgCount');
  if(pages.length>1){el.textContent=pages.length+' หน้า';el.style.display='';}
  else el.style.display='none';
}

// ═══════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════
async function startCam(){
  if(camStream) return;
  const vid=document.getElementById('video');
  const noCam=document.getElementById('noCamMsg');
  const tries=[
    {video:{facingMode:{ideal:'environment'},width:{ideal:3840},height:{ideal:2160}}},
    {video:{facingMode:'environment'}},
    {video:true}
  ];
  for(const c of tries){
    try{
      camStream=await navigator.mediaDevices.getUserMedia(c);
      vid.srcObject=camStream;
      vTrack=camStream.getVideoTracks()[0];
      noCam.style.display='none'; vid.style.display='block';
      setTimeout(()=>{
        try{ const caps=vTrack.getCapabilities?.()??{};
          document.getElementById('torchBtn').classList.toggle('hidden',!caps.torch);
        }catch(_){}
      },500);
      return;
    }catch(_){}
  }
  noCam.style.display='flex'; vid.style.display='none';
}
function stopCam(){
  if(!camStream)return;
  camStream.getTracks().forEach(t=>t.stop());
  camStream=null; vTrack=null; torchOn=false;
  document.getElementById('torchBtn').className='hidden';
}
function retryCamera(){ document.getElementById('noCamMsg').style.display='none'; startCam(); }
async function toggleTorch(){
  if(!vTrack)return;
  torchOn=!torchOn;
  try{ await vTrack.applyConstraints({advanced:[{torch:torchOn}]});
    document.getElementById('torchBtn').classList.toggle('on',torchOn);
  }catch(_){toast('กล้องนี้ไม่รองรับไฟฉาย','err');torchOn=false;}
}

// ═══════════════════════════════════════
//  CAPTURE
// ═══════════════════════════════════════
function doCapture(){
  if(!camStream){toast('กล้องยังไม่พร้อม','err');return;}
  const vid=document.getElementById('video');
  const vw=vid.videoWidth, vh=vid.videoHeight;
  if(!vw||!vh){toast('กล้องยังไม่พร้อม','err');return;}
  // Flash
  const fl=document.createElement('div');
  fl.style.cssText='position:fixed;inset:0;background:#fff;opacity:.5;z-index:999;pointer-events:none;transition:opacity .3s';
  document.body.appendChild(fl);
  requestAnimationFrame(()=>{ setTimeout(()=>fl.style.opacity='0',30); setTimeout(()=>fl.remove(),360); });
  // Capture frame
  const sc=Math.min(1,MAX_DIM/Math.max(vw,vh));
  const src=mkC(Math.round(vw*sc),Math.round(vh*sc));
  ctx(src).drawImage(vid,0,0,src.width,src.height);
  pages.push({src,cropped:null,processed:null,filter:'shadow'});
  activePg=pages.length-1;
  showView('crop');
}
function onFile(e){
  const files=[...e.target.files]; if(!files.length)return;
  setLoad(true,'กำลังโหลดภาพ...');
  let done=0;
  files.forEach(f=>{
    const img=new Image();
    img.onload=()=>{
      const sc=Math.min(1,MAX_DIM/Math.max(img.width,img.height));
      const src=mkC(Math.round(img.width*sc),Math.round(img.height*sc));
      ctx(src).drawImage(img,0,0,src.width,src.height);
      pages.push({src,cropped:null,processed:null,filter:'shadow'});
      URL.revokeObjectURL(img.src);
      if(++done===files.length){activePg=pages.length-1;setLoad(false);showView('crop');}
    };
    img.onerror=()=>{toast('โหลดไม่สำเร็จ','err');if(++done===files.length)setLoad(false);};
    img.src=URL.createObjectURL(f);
  });
  e.target.value='';
}

// ═══════════════════════════════════════
//  AUTO-DETECT CORNERS  (Projection Profile)
//  หาขอบเอกสารโดย:
//  1) คำนวณ Sobel edge magnitude
//  2) รวม edge แต่ละแถว/คอลัมน์ (projection)
//  3) Smooth
//  4) สแกนจากขอบนอกเข้ามาหาจุดที่ projection พุ่งสูง = ขอบกระดาษ
// ═══════════════════════════════════════
function autoCorners(srcCanvas){
  // ① Downsample ให้ aspect ratio ถูกต้อง
  const LONG = 320;
  const ar = srcCanvas.width / srcCanvas.height;
  const W = ar>=1 ? LONG : Math.round(LONG*ar);
  const H = ar>=1 ? Math.round(LONG/ar) : LONG;

  const sc = mkC(W, H);
  ctx(sc).drawImage(srcCanvas, 0, 0, W, H);
  const raw = ctx(sc).getImageData(0, 0, W, H).data;
  freeC(sc);

  // ② Grayscale
  const g = new Float32Array(W*H);
  for(let i=0,p=0;i<raw.length;i+=4,p++)
    g[p]=raw[i]*.299+raw[i+1]*.587+raw[i+2]*.114;

  // ③ Sobel magnitude
  const mag = new Float32Array(W*H);
  for(let y=1;y<H-1;y++) for(let x=1;x<W-1;x++){
    const gx= -g[(y-1)*W+x-1]+g[(y-1)*W+x+1] - 2*g[y*W+x-1]+2*g[y*W+x+1] - g[(y+1)*W+x-1]+g[(y+1)*W+x+1];
    const gy= -g[(y-1)*W+x-1]-2*g[(y-1)*W+x]-g[(y-1)*W+x+1] + g[(y+1)*W+x-1]+2*g[(y+1)*W+x]+g[(y+1)*W+x+1];
    mag[y*W+x]=Math.sqrt(gx*gx+gy*gy);
  }

  // ④ Projection profiles
  const rP=new Float32Array(H), cP=new Float32Array(W);
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){ rP[y]+=mag[y*W+x]; cP[x]+=mag[y*W+x]; }

  // ⑤ Smooth (moving avg r=5)
  const smth=(a,r=5)=>{
    const o=new Float32Array(a.length);
    for(let i=0;i<a.length;i++){let s=0,n=0; for(let d=-r;d<=r;d++){const j=i+d;if(j>=0&&j<a.length){s+=a[j];n++;}} o[i]=s/n;}
    return o;
  };
  const sR=smth(rP), sC=smth(cP);

  // ⑥ Adaptive threshold = mean + 0.6*std  of INNER 60% of array
  const thr=(arr)=>{
    const lo=Math.floor(arr.length*.2),hi=Math.floor(arr.length*.8);
    const sl=arr.slice(lo,hi);
    const mean=sl.reduce((a,b)=>a+b,0)/sl.length;
    const std=Math.sqrt(sl.reduce((a,b)=>a+(b-mean)**2,0)/sl.length);
    return mean+std*0.6;
  };
  const tR=thr(sR), tC=thr(sC);

  // ⑦ Scan inward from each side — skip 4px from edge to avoid frame artifacts
  const scan=(arr,thresh,from,to)=>{
    const step=from<to?1:-1, skip=4;
    for(let i=from;i!==to;i+=step){
      if(Math.abs(i-from)<skip) continue;
      if(arr[i]>thresh) return i;
    }
    // fallback: 7% inset
    return from<to ? Math.floor(arr.length*.07) : Math.floor(arr.length*.93);
  };

  const top    = scan(sR, tR, 0, H);
  const bottom = scan(sR, tR, H-1, -1);
  const left   = scan(sC, tC, 0, W);
  const right  = scan(sC, tC, W-1, -1);

  // ⑧ Validate
  const sx=srcCanvas.width/W, sy=srcCanvas.height/H;
  if((right-left)<W*.12||(bottom-top)<H*.12){
    const px=srcCanvas.width*.07, py=srcCanvas.height*.07;
    return [{x:px,y:py},{x:srcCanvas.width-px,y:py},
            {x:srcCanvas.width-px,y:srcCanvas.height-py},{x:px,y:srcCanvas.height-py}];
  }

  // Small padding (4px in thumb coords)
  const pad=4;
  return [
    {x:Math.max(0,(left-pad)*sx),          y:Math.max(0,(top-pad)*sy)},
    {x:Math.min(srcCanvas.width,(right+pad)*sx),  y:Math.max(0,(top-pad)*sy)},
    {x:Math.min(srcCanvas.width,(right+pad)*sx),  y:Math.min(srcCanvas.height,(bottom+pad)*sy)},
    {x:Math.max(0,(left-pad)*sx),          y:Math.min(srcCanvas.height,(bottom+pad)*sy)},
  ];
}

// ═══════════════════════════════════════
//  CROP VIEW
// ═══════════════════════════════════════
function setupCrop(){
  const page=pages[activePg]; if(!page)return;
  const src=page.src;

  // ① Fit canvas display size to container
  const area=document.getElementById('cropArea');
  const aW=area.clientWidth-28, aH=area.clientHeight-28;
  const ar=src.width/src.height;
  let dW,dH;
  if(ar>aW/aH){dW=aW;dH=Math.round(aW/ar);}
  else{dH=aH;dW=Math.round(aH*ar);}

  const cc=document.getElementById('cropCanvas');
  // Internal resolution = source image (so corners are in source px)
  cc.width=src.width; cc.height=src.height;
  // Display size via CSS
  cc.style.width=dW+'px'; cc.style.height=dH+'px';

  // ② Draw image
  ctx(cc).drawImage(src,0,0);

  // ③ Auto-detect corners
  corners=autoCorners(src);

  // ④ Draw overlay on canvas
  drawOverlay();

  // ⑤ Position SVG handles (in display coords)
  syncHandles();

  // ⑥ Bind drag to handles
  bindDrag();
}

function drawOverlay(){
  const cc=document.getElementById('cropCanvas');
  const c=ctx(cc);
  const w=cc.width, h=cc.height;
  const page=pages[activePg];

  c.clearRect(0,0,w,h);
  c.drawImage(page.src,0,0);

  // Dark mask outside quad
  c.save();
  c.fillStyle='rgba(0,0,0,0.58)';
  c.beginPath();
  c.rect(0,0,w,h);
  c.moveTo(corners[0].x,corners[0].y);
  corners.forEach((p,i)=>{ if(i>0)c.lineTo(p.x,p.y); });
  c.closePath();
  c.fill('evenodd');
  c.restore();

  // Grid
  c.save();
  c.beginPath();
  c.moveTo(corners[0].x,corners[0].y);
  corners.forEach((p,i)=>{ if(i>0)c.lineTo(p.x,p.y); });
  c.closePath(); c.clip();
  c.strokeStyle='rgba(255,255,255,.2)'; c.lineWidth=Math.max(1,w*.0012);
  for(let t=1;t<3;t++){
    c.beginPath(); c.moveTo(lerp(corners[0].x,corners[3].x,t/3),lerp(corners[0].y,corners[3].y,t/3));
    c.lineTo(lerp(corners[1].x,corners[2].x,t/3),lerp(corners[1].y,corners[2].y,t/3)); c.stroke();
    c.beginPath(); c.moveTo(lerp(corners[0].x,corners[1].x,t/3),lerp(corners[0].y,corners[1].y,t/3));
    c.lineTo(lerp(corners[3].x,corners[2].x,t/3),lerp(corners[3].y,corners[2].y,t/3)); c.stroke();
  }
  c.restore();
}

// Sync SVG handles to current corners (converts source→display coords)
function syncHandles(){
  const cc=document.getElementById('cropCanvas');
  // Scale factor: display px per source px
  const sx=cc.clientWidth /cc.width;
  const sy=cc.clientHeight/cc.height;

  document.getElementById('selPoly').setAttribute('points',
    corners.map(p=>`${p.x*sx},${p.y*sy}`).join(' '));
  corners.forEach((p,i)=>{
    const el=document.getElementById('h'+i);
    el.setAttribute('cx', p.x*sx);
    el.setAttribute('cy', p.y*sy);
  });
}

// ═══════════════════════════════════════
//  DRAG HANDLES
// ═══════════════════════════════════════
function bindDrag(){
  for(let i=0;i<4;i++){
    const old=document.getElementById('h'+i);
    const fresh=old.cloneNode(true);
    old.replaceWith(fresh);
    const idx=i;
    fresh.addEventListener('mousedown', e=>startDrag(e,idx));
    fresh.addEventListener('touchstart', e=>startDrag(e,idx),{passive:false});
  }
}

// Convert a client-space point → source canvas coords
function clientToSource(clientX, clientY){
  const cc=document.getElementById('cropCanvas');
  const rect=cc.getBoundingClientRect();
  const sx=cc.width /rect.width;
  const sy=cc.height/rect.height;
  return {
    x: Math.max(0,Math.min(cc.width,  (clientX-rect.left)*sx)),
    y: Math.max(0,Math.min(cc.height, (clientY-rect.top )*sy))
  };
}

function startDrag(e, idx){
  e.preventDefault();

  function getClient(ev){ const pt=ev.touches?ev.touches[0]:ev; return{x:pt.clientX,y:pt.clientY}; }

  const onMove=ev=>{
    ev.preventDefault();
    const {x,y}=getClient(ev);
    corners[idx]=clientToSource(x,y);
    drawOverlay();
    syncHandles();
    // Magnifier
    const wrap=document.getElementById('cropWrap');
    const wr=wrap.getBoundingClientRect();
    showMag(x,y, x-wr.left, y-wr.top);
  };
  const onEnd=()=>{
    document.getElementById('mag').style.display='none';
    window.removeEventListener('mousemove',onMove);
    window.removeEventListener('mouseup',onEnd);
    window.removeEventListener('touchmove',onMove);
    window.removeEventListener('touchend',onEnd);
  };
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onEnd);
  window.addEventListener('touchmove',onMove,{passive:false});
  window.addEventListener('touchend',onEnd);

  // Show initial magnifier
  const {x,y}=getClient(e);
  const wr=document.getElementById('cropWrap').getBoundingClientRect();
  showMag(x,y, x-wr.left, y-wr.top);
}

function showMag(clientX, clientY, localX, localY){
  const mag=document.getElementById('mag');
  const wrap=document.getElementById('cropWrap');
  const wr=wrap.getBoundingClientRect();
  // Position above finger
  const mx=Math.max(0,Math.min(wr.width-110, localX-55));
  const my=Math.max(0, localY-148);
  mag.style.left=mx+'px'; mag.style.top=my+'px'; mag.style.display='block';
  // Draw zoom
  const sp=clientToSource(clientX, clientY);
  const zoom=3.2, sw=110/zoom, sh=110/zoom;
  const mc=document.getElementById('magCanvas').getContext('2d');
  mc.clearRect(0,0,110,110);
  mc.drawImage(pages[activePg].src, sp.x-sw/2, sp.y-sh/2, sw, sh, 0, 0, 110, 110);
}

// ═══════════════════════════════════════
//  ROTATE SOURCE
// ═══════════════════════════════════════
function rotateSrc(deg){
  const page=pages[activePg];
  const src=page.src;
  const rad=deg*Math.PI/180;
  const nW=Math.abs(Math.round(src.width*Math.cos(rad)))+Math.abs(Math.round(src.height*Math.sin(rad)));
  const nH=Math.abs(Math.round(src.width*Math.sin(rad)))+Math.abs(Math.round(src.height*Math.cos(rad)));
  const rot=mkC(nW,nH);
  const c=ctx(rot);
  c.translate(nW/2,nH/2); c.rotate(rad); c.drawImage(src,-src.width/2,-src.height/2);
  freeC(page.src); page.src=rot;
  setupCrop();
}

// ═══════════════════════════════════════
//  APPLY CROP (Perspective Warp — Bilinear)
// ═══════════════════════════════════════
function doApply(){
  setLoad(true,'กำลังดัดมุมมองเอกสาร...');
  setTimeout(()=>{
    const page=pages[activePg];
    const [tl,tr,br,bl]=corners;
    const outW=Math.round(Math.max(Math.hypot(tr.x-tl.x,tr.y-tl.y),Math.hypot(br.x-bl.x,br.y-bl.y)));
    const outH=Math.round(Math.max(Math.hypot(tl.x-bl.x,tl.y-bl.y),Math.hypot(tr.x-br.x,tr.y-br.y)));
    if(outW<4||outH<4){setLoad(false);toast('พื้นที่ crop เล็กเกินไป','err');return;}

    freeC(page.cropped);
    const dst=mkC(outW,outH);
    const dc=ctx(dst);
    const di=dc.createImageData(outW,outH);
    const db=di.data;

    const sc=ctx(page.src);
    const si=sc.getImageData(0,0,page.src.width,page.src.height);
    const sb=si.data;
    const sW=page.src.width, sH=page.src.height;

    for(let y=0;y<outH;y++){
      const v=outH>1?y/(outH-1):0;
      const lx=lerp(tl.x,bl.x,v), ly=lerp(tl.y,bl.y,v);
      const rx=lerp(tr.x,br.x,v), ry=lerp(tr.y,br.y,v);
      for(let x=0;x<outW;x++){
        const u=outW>1?x/(outW-1):0;
        const spx=lerp(lx,rx,u), spy=lerp(ly,ry,u);
        const x0=Math.floor(spx),y0=Math.floor(spy);
        const x1=Math.min(x0+1,sW-1),y1=Math.min(y0+1,sH-1);
        if(x0<0||y0<0||x0>=sW||y0>=sH){continue;}
        const fx=spx-x0,fy=spy-y0;
        const i00=(y0*sW+x0)*4,i10=(y0*sW+x1)*4,i01=(y1*sW+x0)*4,i11=(y1*sW+x1)*4,di2=(y*outW+x)*4;
        for(let c=0;c<3;c++) db[di2+c]=Math.round(sb[i00+c]*(1-fx)*(1-fy)+sb[i10+c]*fx*(1-fy)+sb[i01+c]*(1-fx)*fy+sb[i11+c]*fx*fy);
        db[di2+3]=255;
      }
    }
    dc.putImageData(di,0,0);
    page.cropped=dst;
    applyFilter(activePg, page.filter);
    setLoad(false);
    showView('edit');
  },40);
}

// ═══════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════
function applyFilter(pi, name){
  const page=pages[pi]; if(!page.cropped)return;
  page.filter=name;
  freeC(page.processed);
  const w=page.cropped.width,h=page.cropped.height;
  const out=mkC(w,h); const oc=ctx(out); oc.drawImage(page.cropped,0,0);
  if(name==='original'){page.processed=out;return;}
  const im=oc.getImageData(0,0,w,h); const d=im.data;

  if(name==='shadow'){
    const bW=Math.max(6,w>>5),bH=Math.max(6,h>>5);
    const sm=mkC(bW,bH); ctx(sm).drawImage(page.cropped,0,0,bW,bH);
    const bl=mkC(w,h); const bc=ctx(bl);
    bc.imageSmoothingEnabled=true; bc.imageSmoothingQuality='high';
    bc.drawImage(sm,0,0,w,h); freeC(sm);
    const bg=bc.getImageData(0,0,w,h).data; freeC(bl);
    for(let i=0;i<d.length;i+=4){
      const lum=d[i]*.299+d[i+1]*.587+d[i+2]*.114;
      let bgL=bg[i]*.299+bg[i+1]*.587+bg[i+2]*.114; if(bgL<1)bgL=1;
      let v=(lum/bgL)*255;
      v=v>210?255:Math.max(0,(v-118)*1.85);
      d[i]=d[i+1]=d[i+2]=Math.min(255,v);
    }
  } else if(name==='color'){
    for(let i=0;i<d.length;i+=4){
      const lum=d[i]*.299+d[i+1]*.587+d[i+2]*.114; const B=1.35;
      d[i]=clamp((d[i]-128)*B+148); d[i+1]=clamp((d[i+1]-128)*B+148); d[i+2]=clamp((d[i+2]-128)*B+148);
      if(lum>188){d[i]=255;d[i+1]=255;d[i+2]=255;}
    }
  } else if(name==='bw'){
    for(let i=0;i<d.length;i+=4){const v=d[i]*.299+d[i+1]*.587+d[i+2]*.114>130?255:0;d[i]=d[i+1]=d[i+2]=v;}
  } else if(name==='enhance'){
    const bW=Math.max(6,w>>4),bH=Math.max(6,h>>4);
    const sm=mkC(bW,bH); ctx(sm).drawImage(page.cropped,0,0,bW,bH);
    const bl=mkC(w,h); const bc=ctx(bl);
    bc.imageSmoothingEnabled=true; bc.imageSmoothingQuality='high';
    bc.drawImage(sm,0,0,w,h); freeC(sm);
    const blur=bc.getImageData(0,0,w,h).data; freeC(bl);
    for(let i=0;i<d.length;i+=4) for(let c=0;c<3;c++) d[i+c]=clamp(d[i+c]+(d[i+c]-blur[i+c])*1.7);
  }
  oc.putImageData(im,0,0); page.processed=out;
}
function pickFilter(btn){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  setLoad(true,'กำลังประมวลผล...');
  setTimeout(()=>{ applyFilter(activePg,btn.dataset.f); renderEdit(); setLoad(false); },30);
}

// ═══════════════════════════════════════
//  EDIT VIEW
// ═══════════════════════════════════════
function renderEdit(){
  const page=pages[activePg]; if(!page?.processed)return;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b.dataset.f===page.filter));
  const pv=document.getElementById('previewCanvas');
  pv.width=page.processed.width; pv.height=page.processed.height;
  ctx(pv).drawImage(page.processed,0,0);
  const badge=document.getElementById('pgBadge');
  if(pages.length>1){badge.textContent=`หน้า ${activePg+1}/${pages.length}`;badge.style.display='';}
  else badge.style.display='none';
  renderThumbs(); updatePgCount();
}
function renderThumbs(){
  const strip=document.getElementById('thumbStrip');
  if(pages.length<=1){strip.style.display='none';return;}
  strip.style.display='flex'; strip.innerHTML='';
  pages.forEach((p,i)=>{
    if(!p.processed)return;
    const wrap=document.createElement('div'); wrap.className='twrap';
    const c=document.createElement('canvas');
    const sc=56/p.processed.height; c.width=Math.round(p.processed.width*sc); c.height=56;
    c.style.cssText=`display:block;border-radius:6px;cursor:pointer;border:2px solid ${i===activePg?'#3b82f6':'rgba(255,255,255,.15)'}`;
    ctx(c).drawImage(p.processed,0,0,c.width,56);
    c.onclick=()=>{activePg=i;renderEdit();};
    const del=document.createElement('div'); del.className='tdel'; del.textContent='✕';
    del.onclick=ev=>{ev.stopPropagation();freeC(pages[i].src);freeC(pages[i].cropped);freeC(pages[i].processed);pages.splice(i,1);if(!pages.length){showView('camera');return;}activePg=Math.min(activePg,pages.length-1);renderEdit();};
    wrap.append(c,del); strip.appendChild(wrap);
  });
  const add=document.createElement('button');
  add.style.cssText='flex-shrink:0;width:44px;height:56px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#888;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center';
  add.innerHTML='<i class="ph-bold ph-plus"></i>'; add.onclick=()=>showView('camera');
  strip.appendChild(add);
}

// ═══════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════
function saveImg(){
  const p=pages[activePg];
  if(!p?.processed){toast('ไม่มีภาพ','err');return;}
  try{const a=document.createElement('a');a.download=`scan_${Date.now()}.jpg`;a.href=p.processed.toDataURL('image/jpeg',.95);a.click();toast('บันทึกรูปภาพสำเร็จ ✓','ok');}
  catch(e){toast('บันทึกไม่สำเร็จ','err');}
}
async function savePdf(){
  const valid=pages.filter(p=>p.processed);
  if(!valid.length){toast('ไม่มีเอกสาร','err');return;}
  setLoad(true,'กำลังสร้าง PDF...');
  await new Promise(r=>setTimeout(r,60));
  try{
    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
    for(let i=0;i<valid.length;i++){
      const p=valid[i].processed;
      if(i>0)pdf.addPage();
      const rat=p.width/p.height; let iw=pw-8,ih=(pw-8)/rat;
      if(ih>ph-8){ih=ph-8;iw=ih*rat;}
      pdf.addImage(p.toDataURL('image/jpeg',p.width*p.height>3e6?.78:.9),'JPEG',(pw-iw)/2,(ph-ih)/2,iw,ih,undefined,'FAST');
      setLoad(true,`หน้า ${i+1}/${valid.length}...`);
      await new Promise(r=>setTimeout(r,8));
    }
    pdf.save(`scan_${Date.now()}.pdf`); setLoad(false);
    toast(`PDF ${valid.length} หน้า สำเร็จ ✓`,'ok');
  }catch(e){setLoad(false);toast('สร้าง PDF ไม่สำเร็จ','err');console.error(e);}
}

// ── INIT ──
showView('camera');
</script>
