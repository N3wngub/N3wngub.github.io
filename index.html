<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Tracker - Clean & Smart</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        /* ══════════════════════════════════════════════════════════
           MODERN MINIMALIST DESIGN TOKENS
           ══════════════════════════════════════════════════════════ */
        :root {
          /* Light Mode */
          --bg: #f5f5f7;
          --surface: #ffffff;
          --card: #ffffff;
          --border: rgba(0,0,0,0.08);
          --ink: #1d1d1f;
          --ink2: #515154;
          --ink3: #86868b;
          --sidebar-bg: #ffffff;
          --sidebar-text: #1d1d1f;
          --accent: #0A84FF; /* iOS Blue */
          --accent-hover: #0070E0;
          --accent2: #5E5CE6;
          --green: #34C759;
          --yellow: #FF9F0A;
          --red: #FF453A;
          
          --mono: 'DM Mono', monospace;
          --body: 'Prompt', sans-serif;
          
          --shadow-sm: 0 1px 4px rgba(0,0,0,0.04);
          --shadow: 0 4px 14px rgba(0,0,0,0.06);
          --shadow-lg: 0 12px 32px rgba(0,0,0,0.1);
          --radius: 16px;
          --radius-sm: 10px;
          --nav-h: 72px;
        }
        
        [data-theme="dark"] {
          --bg: #000000;
          --surface: #1c1c1e;
          --card: #1c1c1e;
          --border: rgba(255,255,255,0.12);
          --ink: #f5f5f7;
          --ink2: #ebebf5;
          --ink3: #8e8e93;
          --sidebar-bg: #1c1c1e;
          --sidebar-text: #f5f5f7;
          
          --shadow-sm: 0 1px 4px rgba(0,0,0,0.4);
          --shadow: 0 4px 14px rgba(0,0,0,0.4);
          --shadow-lg: 0 12px 32px rgba(0,0,0,0.6);
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        html { -webkit-font-smoothing: antialiased; }
        body {
          background: var(--bg);
          color: var(--ink);
          font-family: var(--body);
          min-height: 100vh;
          transition: background 0.3s ease, color 0.3s ease;
        }
        input, button, textarea, select { font-family: var(--body); }
        
        .app { display:flex; min-height:100vh; }
        
        /* ── Sidebar ── */
        .sidebar {
          width: 280px; background: var(--sidebar-bg); color: var(--sidebar-text);
          display: flex; flex-direction: column; position: fixed; top:0; left:0; bottom:0;
          z-index: 10; overflow-y: auto; border-right: 1px solid var(--border);
        }
        .sidebar-brand { padding: 32px 24px 24px; }
        .brand-tag { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
        .brand-name { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .brand-term { font-family: var(--mono); font-size: 11px; color: var(--ink3); margin-top: 4px; }
        
        .sidebar-section { padding: 16px 24px 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; color: var(--ink3); text-transform: uppercase; font-weight: 600; }
        .sidebar-nav { padding: 0 16px; display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
        
        .nav-btn {
          width: 100%; padding: 10px 16px; border-radius: var(--radius-sm); background: transparent; border: none;
          color: var(--ink2); font-weight: 500; font-size: 14px; cursor: pointer; transition: all 0.2s; text-align: left; display: flex; align-items: center; gap: 10px;
        }
        .nav-btn:hover { background: var(--border); color: var(--ink); }
        .nav-btn.active { background: var(--accent); color: #fff; }
        
        .term-dropdown { position: relative; width: 100%; margin-bottom: 8px; }
        .term-dropdown-btn { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--ink); font-family: var(--mono); font-size: 12px; padding: 10px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 500; }
        .term-dropdown-list { display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 0 0 var(--radius-sm) var(--radius-sm); z-index: 50; max-height: 180px; overflow-y: auto; box-shadow: var(--shadow); }
        .term-dropdown-list.open { display: block; border-top: none; }
        .term-dropdown-item { padding: 10px 16px; font-family: var(--mono); font-size: 12px; color: var(--ink2); cursor: pointer; }
        .term-dropdown-item:hover { background: var(--bg); color: var(--ink); }
        
        .subject-list { flex: 1; padding: 0 16px; overflow-y: auto; }
        .subject-item {
          padding: 10px 16px; border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 4px; transition: all 0.2s;
          display: flex; align-items: center; justify-content: space-between; gap: 8px; color: var(--ink2); font-weight: 500;
        }
        .subject-item:hover { background: var(--bg); color: var(--ink); }
        .subject-item.active { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(10,132,255,0.3); }
        .subject-item-grade { font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 6px; background: var(--border); flex-shrink: 0; font-weight: 600; }
        .subject-item.active .subject-item-grade { background: rgba(255,255,255,0.2); color: #fff; }
        
        .sidebar-footer { padding: 24px 16px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
        .btn-new-subject { width: 100%; padding: 12px; background: rgba(10,132,255,0.1); border: none; border-radius: var(--radius-sm); color: var(--accent); font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .btn-new-subject:hover { background: rgba(10,132,255,0.15); }
        
        .auth-box { background: var(--bg); border-radius: var(--radius-sm); padding: 12px; border: 1px solid var(--border); }
        .auth-btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--ink); font-family: var(--body); font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; transition: background 0.2s; }
        .auth-btn:hover { background: var(--bg); }
        .user-info { font-size: 11px; color: var(--ink3); text-align: center; margin-bottom: 8px; word-break: break-all; }
        
        /* ── Main Area ── */
        .main { margin-left: 280px; flex: 1; padding: 40px; max-width: calc(100vw - 280px); }
        .topbar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; gap: 16px; flex-wrap: wrap; }
        
        .subject-title input { background: transparent; border: none; font-family: var(--body); font-size: 32px; font-weight: 700; color: var(--ink); outline: none; letter-spacing: -0.5px; width: 100%; max-width: 500px; }
        .subject-title input:focus { border-bottom: 2px solid var(--accent); }
        
        .grade-pill { font-family: var(--mono); font-size: 14px; padding: 6px 16px; border-radius: 99px; font-weight: 700; border: 2px solid; margin-top: 8px; display: inline-block; }
        .score-detail { font-size: 13px; color: var(--ink3); margin-top: 8px; font-family: var(--mono); }
        
        .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .btn-outline { background: var(--surface); border-color: var(--border); color: var(--ink); }
        .btn-outline:hover { background: var(--bg); border-color: var(--ink3); }
        .btn-danger { background: rgba(255,69,58,0.1); color: var(--red); }
        .btn-danger:hover { background: rgba(255,69,58,0.2); }
        .theme-toggle { background: var(--ink); color: var(--bg); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; }
        
        .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .stat-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--ink3); text-transform: uppercase; margin-bottom: 12px; font-weight: 600; }
        .stat-value { font-family: var(--mono); font-size: 32px; font-weight: 700; line-height: 1; color: var(--ink); }
        .stat-sub { font-size: 12px; color: var(--ink3); margin-top: 8px; }
        
        .section-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
        .section-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink2); margin-bottom: 16px; font-weight: 600; }
        
        /* ── Categories ── */
        .categories { display: flex; flex-direction: column; gap: 16px; }
        .category-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
        .category-header { display: grid; grid-template-columns: 1fr 85px 85px 90px 70px 32px; gap: 12px; align-items: center; padding: 16px 24px; background: var(--bg); border-bottom: 1px solid var(--border); }
        .cat-name-input { background: none; border: none; font-size: 15px; font-weight: 600; color: var(--ink); outline: none; width: 100%; }
        .cat-stat { font-family: var(--mono); font-size: 11px; color: var(--ink3); text-align: center; }
        .cat-stat strong { display: block; font-size: 15px; color: var(--ink); font-weight: 700; margin-bottom: 2px; }
        .weight-input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 8px; font-family: var(--mono); font-size: 13px; color: var(--ink); width: 64px; text-align: center; outline: none; }
        .weight-input:focus { border-color: var(--accent); }
        
        .items-list { padding: 12px 16px; }
        .col-header-row { display: grid; grid-template-columns: 1fr 90px 90px 40px 60px 32px; gap: 12px; padding: 0 8px 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
        .col-hdr { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--ink3); text-align: center; font-weight: 600; }
        .col-hdr:first-child { text-align: left; }
        
        .item-row { display: grid; grid-template-columns: 1fr 90px 90px 40px 60px 32px; gap: 12px; align-items: center; padding: 8px; border-radius: 8px; }
        .item-row:hover { background: var(--bg); }
        .item-row input { background: var(--surface); border: 1px solid var(--border); font-size: 13px; color: var(--ink); outline: none; padding: 6px 10px; border-radius: 8px; width: 100%; }
        .item-row input:focus { border-color: var(--accent); }
        .item-row input[type=number] { text-align: center; font-family: var(--mono); }
        .item-pct { font-family: var(--mono); font-size: 12px; font-weight: 600; text-align: center; }
        
        .btn-icon { background: transparent; border: none; font-size: 16px; cursor: pointer; color: var(--ink3); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-icon:hover { background: var(--border); color: var(--ink); }
        .btn-icon.delete:hover { background: rgba(255,69,58,0.1); color: var(--red); }
        .btn-lock.locked { color: var(--accent); background: rgba(10,132,255,0.1); }
        
        .btn-add-item { background: none; border: none; color: var(--accent); font-weight: 600; font-size: 13px; cursor: pointer; padding: 8px 16px; text-align: left; margin: 4px 8px 8px; border-radius: 8px; }
        .btn-add-item:hover { background: rgba(10,132,255,0.08); }
        
        .btn-add-category { background: var(--surface); border: 2px dashed var(--border); border-radius: var(--radius); padding: 16px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--ink3); transition: all 0.2s; width: 100%; margin-top: 8px; }
        .btn-add-category:hover { border-color: var(--ink3); color: var(--ink); }
        
        /* ── AI Feature ── */
        .btn-ai-import {
          background: linear-gradient(135deg, #0A84FF 0%, #5E5CE6 100%);
          color: white; border: none; border-radius: var(--radius);
          padding: 16px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 600;
          transition: all 0.2s; width: 100%; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 8px;
          box-shadow: 0 4px 14px rgba(10,132,255,0.3);
        }
        .btn-ai-import:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(10,132,255,0.4); }
        
        /* ── Dashboard ── */
        .dash-hero { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; margin-bottom: 24px; box-shadow: var(--shadow-sm); display: flex; justify-content: space-between; align-items: center; }
        .dash-hero-gpa { font-size: 56px; font-weight: 800; line-height: 1; letter-spacing: -1px; color: var(--ink); }
        .dash-hero-label { font-family: var(--mono); font-size: 12px; letter-spacing: 2px; color: var(--ink3); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
        .dash-stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; margin-bottom: 24px; }
        
        .dash-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
        .dash-table th, .dash-table td { padding: 16px 24px; text-align: left; border-bottom: 1px solid var(--border); }
        .dash-table th { font-family: var(--mono); font-size: 11px; text-transform: uppercase; color: var(--ink3); font-weight: 600; background: var(--bg); }
        .dash-table tr:hover td { background: var(--bg); cursor: pointer; }
        .dash-table tr:last-child td { border-bottom: none; }
        
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        
        /* ── General Elements ── */
        .note-area { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 14px; color: var(--ink); resize: vertical; min-height: 80px; outline: none; }
        .note-area:focus { border-color: var(--accent); }
        
        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 99999; display: flex; flex-direction: column; gap: 12px; }
        .toast { background: var(--ink); color: var(--bg); padding: 14px 24px; border-radius: 12px; box-shadow: var(--shadow-lg); font-size: 14px; font-weight: 500; animation: slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* AI Loading */
        #ai-loading { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 10001; display: none; align-items: center; justify-content: center; flex-direction: column; color: white; gap: 16px; }
        .ai-spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #0A84FF; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 1024px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            .category-header { display: flex; flex-wrap: wrap; }
            .charts-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 20px; padding-bottom: 100px; max-width: 100vw; }
            .topbar { flex-direction: column; }
            .subject-title input { font-size: 24px; }
            .item-row { grid-template-columns: 1fr 60px 60px 40px 40px 32px; }
            .col-header-row { display: none; }
            #bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: 72px; background: var(--surface); border-top: 1px solid var(--border); z-index: 100; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); }
            .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--ink3); font-size: 10px; font-weight: 600; border: none; background: transparent; }
            .bnav-item.active { color: var(--accent); }
            .bnav-icon { font-size: 20px; margin-bottom: 4px; }
        }
        @media (min-width: 769px) { #bottom-nav { display: none; } }
    </style>
</head>
<body>
    <div id="toast-container"></div>
    <div id="ai-loading">
        <div class="ai-spinner"></div>
        <div style="font-weight:600;">✨ กำลังให้ AI อ่านข้อมูลจากรูปภาพ...</div>
        <div style="font-size: 13px; opacity: 0.8;">อาจใช้เวลาสักครู่</div>
    </div>

    <div class="app">
        <!-- ── Sidebar ── -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-tag">Academic Tracker</div>
                <div class="brand-name" id="brand-name">คะแนนของฉัน</div>
                <div class="brand-term" id="brand-term-label">เทอม 1</div>
            </div>

            <div class="sidebar-nav">
                <div class="term-dropdown">
                  <button class="term-dropdown-btn" onclick="toggleTermDropdown()">
                    <span id="term-dropdown-label">เลือกเทอม</span> <span>▾</span>
                  </button>
                  <div class="term-dropdown-list" id="term-dropdown-list"></div>
                </div>
                <button class="nav-btn" onclick="addTerm()">＋ เพิ่มเทอมใหม่</button>
                <button class="nav-btn" onclick="renameTerm()">✏️ แก้ชื่อเทอม</button>
                <button class="nav-btn" onclick="showDashboard()" id="nav-dash">📊 Dashboard</button>
            </div>

            <div class="sidebar-section">วิชาในเทอมนี้</div>
            <div class="subject-list" id="subject-list"></div>

            <div class="sidebar-footer">
                <button class="btn-new-subject" onclick="addSubject()">+ เพิ่มวิชาใหม่</button>
                
                <!-- Auth Section -->
                <div class="auth-box">
                    <div id="user-info-display" class="user-info" style="display:none;"></div>
                    <button class="auth-btn" id="btn-login-google" onclick="loginGoogle()">
                        <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Sign in with Google
                    </button>
                    <button class="auth-btn" id="btn-login-apple" onclick="loginApple()">
                        <svg width="14" height="14" viewBox="0 0 24 24"><path fill="currentColor" d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.04 2.31-.73 3.73-.62 1.62.1 2.81.76 3.65 1.95-3.04 1.77-2.52 5.68.31 6.8-.75 1.83-1.66 3.42-2.77 4.04zm-3.53-15.6c.07-2.18 1.7-4.14 3.91-4.68.41 2.4-1.3 4.54-3.91 4.68z"/></svg>
                        Sign in with Apple
                    </button>
                    <button class="auth-btn" id="btn-logout" onclick="logout()" style="display:none; color:var(--red);">Logout</button>
                </div>
                
                <div style="display:flex; gap:8px;">
                    <button class="theme-toggle" onclick="toggleTheme()" style="flex:1;">🌙 Theme</button>
                </div>
            </div>
        </aside>

        <!-- ── Main ── -->
        <main class="main">
            <!-- Dash View -->
            <div id="dashboard-view"></div>

            <!-- Subject View -->
            <div id="subject-view" style="display:none;">
                <div class="topbar">
                    <div style="flex:1;">
                        <div class="subject-title">
                            <input type="text" id="subject-name-input" maxlength="40" oninput="renameSubject(this.value)">
                        </div>
                        <div class="grade-pill" id="grade-pill">—</div>
                        <div class="score-detail" id="score-detail-line"></div>
                    </div>
                    <div style="display:flex; gap:8px; align-items:flex-start;">
                        <button class="btn btn-outline" onclick="deleteSubject()">🗑️ ลบวิชา</button>
                    </div>
                </div>

                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">คะแนนสะสม</div>
                        <div class="stat-value" id="stat-raw">—</div>
                        <div class="stat-sub" id="stat-raw-sub"></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">คะแนนถ่วงน้ำหนัก</div>
                        <div class="stat-value" id="stat-weighted">—</div>
                        <div class="stat-sub">คะแนนรวมสุทธิ</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">เกรดที่คาดหวัง</div>
                        <div class="stat-value" id="stat-grade">—</div>
                        <div class="stat-sub">จากคะแนนที่มี</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">หน่วยกิต & Final</div>
                        <div style="display:flex; gap:12px; align-items:center; margin-top:8px;">
                            <div>
                                <div style="font-size:11px; color:var(--ink3);">Credit</div>
                                <input type="number" id="credits-input" class="weight-input" oninput="updateCredits(this.value)" style="width:50px; padding:4px;">
                            </div>
                            <div>
                                <div style="font-size:11px; color:var(--ink3);">Final %</div>
                                <input type="number" id="final-weight-input" class="weight-input" oninput="calculate()" style="width:50px; padding:4px;">
                            </div>
                        </div>
                    </div>
                </div>

                <div id="categories-container" class="categories"></div>
                
                <button class="btn-add-category" onclick="addCategory()">+ เพิ่มหมวดคะแนน</button>
                
                <!-- AI Trigger -->
                <button class="btn-ai-import" onclick="document.getElementById('ai-image-input').click()">
                    <span style="font-size: 20px;">✨</span> ให้ AI ดึงข้อมูลคะแนนจากรูปภาพ (Syllabus/เกรด)
                </button>
                <input type="file" id="ai-image-input" accept="image/*" style="display:none" onchange="processAIImage(event)">

                <div class="section-box" style="margin-top:24px;">
                    <div class="section-label">โน้ต / หมายเหตุ</div>
                    <textarea class="note-area" id="subject-note" placeholder="จดบันทึกเกี่ยวกับวิชานี้..." oninput="saveNote(this.value)"></textarea>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Nav -->
    <div id="bottom-nav">
        <button class="bnav-item active" onclick="showDashboard()" id="mob-nav-dash">
            <div class="bnav-icon">📊</div>Dashboard
        </button>
        <button class="bnav-item" onclick="document.querySelector('.sidebar').style.display='flex'; document.querySelector('.sidebar').style.width='100vw'; document.querySelector('.sidebar').style.zIndex='200';">
            <div class="bnav-icon">📚</div>วิชาเรียน
        </button>
    </div>

    <!-- Firebase & App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, GoogleAuthProvider, OAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ══════════════════════════════════════════════════════════
        // FIREBASE SETUP
        // ══════════════════════════════════════════════════════════
        const firebaseConfig = {
            apiKey: "AIzaSyC_UFiaMTcZIIjdy1Iyy9z1Qk03Q7a4ix4",
            authDomain: "ude-63c04.firebaseapp.com",
            projectId: "ude-63c04",
            storageBucket: "ude-63c04.firebasestorage.app",
            messagingSenderId: "1073813309750",
            appId: "1:1073813309750:web:378ce0f130c7b84b58cb97",
            measurementId: "G-PNSCDYDQYJ"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'score-tracker-v1';
        let currentUser = null;
        let userId = null;

        // RULE 3: Auth Before Queries
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token).catch(e=>console.error(e));
            } else {
                await signInAnonymously(auth).catch(e=>console.error(e));
            }
        };
        initAuth();

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                userId = user.uid;
                updateAuthUI(user);
                await loadFromCloud();
            } else {
                userId = null;
                updateAuthUI(null);
            }
        });

        window.loginGoogle = async function() {
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); } 
            catch(e) { window.showToast("Login Failed", true); }
        };
        
        window.loginApple = async function() {
            const provider = new OAuthProvider('apple.com');
            try { await signInWithPopup(auth, provider); } 
            catch(e) { window.showToast("Login Failed", true); }
        };

        window.logout = async function() {
            await signOut(auth);
            initAuth(); // Re-authenticate anonymously so local usage continues
            window.showToast("Logged out successfully");
        };

        function updateAuthUI(user) {
            const isAnon = !user || user.isAnonymous;
            document.getElementById('btn-login-google').style.display = isAnon ? 'flex' : 'none';
            document.getElementById('btn-login-apple').style.display = isAnon ? 'flex' : 'none';
            document.getElementById('btn-logout').style.display = isAnon ? 'none' : 'flex';
            
            const infoEl = document.getElementById('user-info-display');
            if (!isAnon && user.email) {
                infoEl.style.display = 'block';
                infoEl.textContent = `Signed in: ${user.email}`;
            } else {
                infoEl.style.display = 'none';
            }
        }

        // ══════════════════════════════════════════════════════════
        // DATA MANAGEMENT (CLOUD + LOCAL)
        // ══════════════════════════════════════════════════════════
        let data = JSON.parse(localStorage.getItem('scoretracker_modern') || 'null') || { terms: [{ id: 1, name: 'เทอม 1', subjects: [] }], currentTermId: 1 };
        let currentTermId = data.currentTermId;
        let currentSubjectId = null;
        let idCounter = Date.now();

        // RULE 1: Strict Paths
        function getDocRef() {
            if (!userId) return null;
            return doc(db, 'artifacts', appId, 'users', userId, 'appData', 'scoreTrackerV1');
        }

        async function loadFromCloud() {
            const ref = getDocRef();
            if (!ref) return;
            try {
                const snap = await getDoc(ref);
                if (snap.exists()) {
                    const cloudData = snap.data().payload;
                    if (cloudData) {
                        data = JSON.parse(cloudData);
                        currentTermId = data.currentTermId || (data.terms.length ? data.terms[0].id : 1);
                        window.renderAll();
                        if(currentSubjectId) window.selectSubject(currentSubjectId);
                        else window.showDashboard();
                        window.showToast("☁️ ข้อมูลซิงค์จาก Cloud แล้ว");
                    }
                } else {
                    // Upload local data to cloud on first login
                    saveToCloud();
                }
            } catch(e) { console.error("Cloud Load Error", e); }
        }

        function saveToCloud() {
            const ref = getDocRef();
            if (!ref) return;
            try {
                setDoc(ref, { payload: JSON.stringify(data), updatedAt: Date.now() }, { merge: true });
            } catch(e) { console.error("Cloud Save Error", e); }
        }

        window.nextId = () => ++idCounter;
        window.save = () => {
            data.currentTermId = currentTermId;
            localStorage.setItem('scoretracker_modern', JSON.stringify(data));
            saveToCloud();
        };

        const getTerm = () => data.terms.find(t => t.id === currentTermId);
        const getSubjects = () => getTerm()?.subjects || [];
        const getSubject = () => getSubjects().find(s => s.id === currentSubjectId);

        // ══════════════════════════════════════════════════════════
        // UI & LOGIC HELPERS
        // ══════════════════════════════════════════════════════════
        window.showToast = function(msg, isError=false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            if(isError) toast.style.borderLeft = '4px solid var(--red)';
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity='0'; setTimeout(()=>toast.remove(),300); }, 3000);
        };

        window.toggleTheme = function() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        };

        window.toggleTermDropdown = function() {
            document.getElementById('term-dropdown-list').classList.toggle('open');
        };

        window.switchTerm = function(id) {
            currentTermId = id; window.save(); currentSubjectId = null;
            window.renderAll(); window.showDashboard();
            document.getElementById('term-dropdown-list').classList.remove('open');
        };

        window.addTerm = function() {
            const name = prompt("ชื่อเทอมใหม่:");
            if(name && name.trim()) {
                const id = window.nextId();
                data.terms.push({ id, name: name.trim(), subjects: [] });
                window.switchTerm(id);
            }
        };

        window.renameTerm = function() {
            const t = getTerm(); if(!t) return;
            const name = prompt("แก้ชื่อเทอม:", t.name);
            if(name && name.trim()) { t.name = name.trim(); window.save(); window.renderAll(); }
        };

        window.addSubject = function() {
            const t = getTerm(); if(!t) return;
            const id = window.nextId();
            t.subjects.push({ id, name:`วิชาใหม่`, credits: 3, finalWeight:30, categories:[], note:'' });
            window.save(); window.renderAll(); window.selectSubject(id);
            window.addCategory('เก็บคะแนน', 70);
            if(window.innerWidth <= 768) document.querySelector('.sidebar').style.display='none';
        };

        window.selectSubject = function(id) {
            currentSubjectId = id;
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('subject-view').style.display = 'block';
            window.renderAll(); window.renderSubjectView();
            if(window.innerWidth <= 768) document.querySelector('.sidebar').style.display='none';
        };

        window.deleteSubject = function() {
            if(confirm("ยืนยันการลบวิชานี้?")) {
                const t = getTerm();
                t.subjects = t.subjects.filter(s => s.id !== currentSubjectId);
                currentSubjectId = null; window.save(); window.renderAll(); window.showDashboard();
            }
        };

        window.showDashboard = function() {
            currentSubjectId = null;
            document.getElementById('subject-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = 'block';
            window.renderAll(); window.renderDashboardView();
            if(window.innerWidth <= 768) document.querySelector('.sidebar').style.display='none';
        };

        window.renameSubject = function(val) { const s = getSubject(); if(s){ s.name = val; window.save(); window.renderSidebar(); } };
        window.saveNote = function(val) { const s = getSubject(); if(s){ s.note = val; window.save(); } };
        window.updateCredits = function(val) { const s = getSubject(); if(s){ s.credits = parseFloat(val)||0; window.save(); window.calculate(); } };

        window.addCategory = function(name='หมวดใหม่', weight=10) { const s=getSubject(); if(s){ s.categories.push({id:window.nextId(), name, weight, items:[]}); window.save(); window.renderSubjectView(); } };
        window.removeCategory = function(cid) { const s=getSubject(); if(s){ s.categories = s.categories.filter(c=>c.id!==cid); window.save(); window.renderSubjectView(); } };
        window.updateCategory = function(cid, field, val) { const s=getSubject(); const c = s.categories.find(c=>c.id===cid); if(c){ c[field] = field==='weight'?parseFloat(val)||0:val; window.save(); window.calculate(); } };
        
        window.addItem = function(cid) { const s=getSubject(); const c=s.categories.find(c=>c.id===cid); if(c){ c.items.push({id:window.nextId(), name:'', score:'', maxScore:100, locked:true}); window.save(); window.renderCategories(); window.calculate(); } };
        window.removeItem = function(cid, iid) { const s=getSubject(); const c=s.categories.find(c=>c.id===cid); if(c){ c.items = c.items.filter(i=>i.id!==iid); window.save(); window.renderCategories(); window.calculate(); } };
        window.updateItem = function(cid, iid, field, val) { const s=getSubject(); const c=s.categories.find(c=>c.id===cid); const i=c?.items.find(i=>i.id===iid); if(i){ i[field]=field==='name'?val:parseFloat(val)||0; window.save(); window.renderCategories(); window.calculate(); } };
        window.toggleLock = function(cid, iid) { const s=getSubject(); const c=s.categories.find(c=>c.id===cid); const i=c?.items.find(i=>i.id===iid); if(i){ i.locked = !i.locked; window.save(); window.renderCategories(); window.calculate(); } };

        // ══════════════════════════════════════════════════════════
        // CALCULATION LOGIC
        // ══════════════════════════════════════════════════════════
        const GP_MAP = { A:4.0,'B+':3.5,B:3.0,'C+':2.5,C:2.0,'D+':1.5,D:1.0,F:0.0 };
        const BOUNDARY = { A:80, 'B+':75, B:70, 'C+':65, C:60, 'D+':55, D:50, F:0 };
        
        window.calcSubject = function(s) {
            if(!s) return { score: 0, raw: 0 };
            let totalW = 0, earned = 0;
            (s.categories||[]).forEach(c => {
                const w = parseFloat(c.weight)||0; if(w===0) return;
                const activeItems = c.items.filter(i => i.locked && i.score !== '' && !isNaN(i.score));
                if(activeItems.length > 0) {
                    const avg = activeItems.reduce((sum,i)=>sum+(parseFloat(i.score)/(parseFloat(i.maxScore)||100))*100, 0) / activeItems.length;
                    earned += avg * (w/100); totalW += w;
                }
            });
            return { score: totalW > 0 ? earned : 0, raw: totalW > 0 ? (earned/totalW)*100 : 0 };
        };

        window.scoreToGrade = function(score) {
            const keys = ['A','B+','B','C+','C','D+','D','F'];
            for(let k of keys) { if(score >= BOUNDARY[k]) return { letter: k, gp: GP_MAP[k] }; }
            return { letter: 'F', gp: 0.0 };
        };

        window.calculate = function() {
            const s = getSubject(); if(!s) return;
            s.finalWeight = parseFloat(document.getElementById('final-weight-input').value) || 0;
            const res = window.calcSubject(s);
            
            document.getElementById('stat-raw').textContent = res.raw.toFixed(1) + '%';
            document.getElementById('stat-weighted').textContent = res.score.toFixed(1) + ' pts';
            
            const g = window.scoreToGrade(res.score);
            document.getElementById('stat-grade').textContent = g.letter;
            document.getElementById('grade-pill').textContent = g.letter;
            
            const pillColor = g.letter === 'A' ? 'var(--green)' : g.letter === 'F' ? 'var(--red)' : 'var(--accent)';
            document.getElementById('grade-pill').style.color = pillColor;
            document.getElementById('grade-pill').style.borderColor = pillColor;
            document.getElementById('stat-grade').style.color = pillColor;

            document.getElementById('score-detail-line').textContent = `สะสมสุทธิ ${res.score.toFixed(1)} คะแนน | น้ำหนัก Final ${s.finalWeight}% | ${s.credits} หน่วยกิต`;
        };

        // ══════════════════════════════════════════════════════════
        // RENDERING
        // ══════════════════════════════════════════════════════════
        window.renderAll = function() {
            window.renderSidebar();
            const t = getTerm();
            document.getElementById('term-dropdown-list').innerHTML = data.terms.map(tm => `<div class="term-dropdown-item" onclick="switchTerm(${tm.id})">${tm.name}</div>`).join('');
            document.getElementById('term-dropdown-label').textContent = t ? t.name : 'เลือกเทอม';
            document.getElementById('brand-term-label').textContent = t ? t.name : '';
        };

        window.renderSidebar = function() {
            const list = document.getElementById('subject-list');
            list.innerHTML = getSubjects().map(s => {
                const res = window.calcSubject(s);
                const g = window.scoreToGrade(res.score);
                return `<div class="subject-item ${s.id===currentSubjectId?'active':''}" onclick="selectSubject(${s.id})">
                            <span>${s.name}</span> <span class="subject-item-grade">${g.letter}</span>
                        </div>`;
            }).join('');
        };

        window.renderSubjectView = function() {
            const s = getSubject(); if(!s) return;
            document.getElementById('subject-name-input').value = s.name;
            document.getElementById('final-weight-input').value = s.finalWeight || 30;
            document.getElementById('credits-input').value = s.credits || 3;
            document.getElementById('subject-note').value = s.note || '';
            window.renderCategories();
            window.calculate();
        };

        window.renderCategories = function() {
            const s = getSubject();
            const container = document.getElementById('categories-container');
            container.innerHTML = s.categories.map(c => {
                const activeItems = c.items.filter(i=>i.locked && i.score!=='');
                const avg = activeItems.length ? activeItems.reduce((sum,i)=>sum+(parseFloat(i.score)/(parseFloat(i.maxScore)||100))*100,0)/activeItems.length : 0;
                
                return `
                <div class="category-card">
                    <div class="category-header">
                        <input class="cat-name-input" value="${c.name}" oninput="updateCategory(${c.id}, 'name', this.value)">
                        <div class="cat-stat"><strong>${avg.toFixed(1)}%</strong>เฉลี่ย</div>
                        <div class="cat-stat"><strong>${activeItems.length}/${c.items.length}</strong>รายการ</div>
                        <div style="display:flex;align-items:center;gap:4px;">
                            <input class="weight-input" type="number" value="${c.weight}" oninput="updateCategory(${c.id}, 'weight', this.value)"><span style="font-size:12px;color:var(--ink3)">%</span>
                        </div>
                        <div class="cat-stat"><strong style="color:var(--accent)">${(avg*c.weight/100).toFixed(1)}</strong>สุทธิ</div>
                        <button class="btn-icon delete" onclick="removeCategory(${c.id})">✕</button>
                    </div>
                    <div class="items-list">
                        <div class="col-header-row">
                            <div class="col-hdr">ชื่องาน</div><div class="col-hdr">คะแนนที่ได้</div><div class="col-hdr">คะแนนเต็ม</div>
                            <div class="col-hdr">🔒</div><div class="col-hdr">%</div><div></div>
                        </div>
                        ${c.items.map(i => {
                            const pct = (i.score!==''&&!isNaN(i.score)) ? ((parseFloat(i.score)/(parseFloat(i.maxScore)||100))*100).toFixed(1) : '—';
                            return `
                            <div class="item-row" style="opacity:${i.locked?'1':'0.5'}">
                                <input placeholder="ชื่องาน" value="${i.name}" oninput="updateItem(${c.id},${i.id},'name',this.value)">
                                <input type="number" placeholder="0" value="${i.score}" oninput="updateItem(${c.id},${i.id},'score',this.value)">
                                <input type="number" placeholder="100" value="${i.maxScore}" oninput="updateItem(${c.id},${i.id},'maxScore',this.value)">
                                <button class="btn-icon btn-lock ${i.locked?'locked':''}" onclick="toggleLock(${c.id},${i.id})">${i.locked?'🔒':'🔓'}</button>
                                <div class="item-pct" style="color:var(--accent)">${pct!== '—' ? pct+'%' : pct}</div>
                                <button class="btn-icon delete" onclick="removeItem(${c.id},${i.id})">✕</button>
                            </div>`
                        }).join('')}
                        <button class="btn-add-item" onclick="addItem(${c.id})">+ เพิ่มคะแนนในหมวดนี้</button>
                    </div>
                </div>`
            }).join('');
        };

        window.renderDashboardView = function() {
            const subjects = getSubjects();
            const dv = document.getElementById('dashboard-view');
            
            if(subjects.length === 0) {
                dv.innerHTML = `<div style="text-align:center; padding:80px 20px; color:var(--ink3);"><h2>ยังไม่มีวิชาเรียน</h2><p>กดเพิ่มวิชาเพื่อเริ่มต้นใช้งาน Dashboard</p></div>`;
                return;
            }

            let totalCr = 0, totalGp = 0;
            const rows = subjects.map(s => {
                const res = window.calcSubject(s);
                const g = window.scoreToGrade(res.score);
                const cr = parseFloat(s.credits)||0;
                totalCr += cr; totalGp += (g.gp * cr);
                return `<tr><td>${s.name}</td><td>${res.score.toFixed(1)}</td><td><span class="subject-item-grade">${g.letter}</span></td></tr>`;
            }).join('');
            
            const gpa = totalCr > 0 ? (totalGp/totalCr).toFixed(2) : '0.00';

            dv.innerHTML = `
                <div class="dash-hero">
                    <div>
                        <div class="dash-hero-label">GPA เทอมนี้</div>
                        <div class="dash-hero-gpa">${gpa}</div>
                    </div>
                    <div style="font-size:48px; opacity:0.8;">🎓</div>
                </div>
                <div class="dash-stats">
                    <div class="section-box" style="margin:0; text-align:center;">
                        <div class="dash-hero-label">วิชาทั้งหมด</div>
                        <div class="dash-hero-gpa" style="font-size:32px;">${subjects.length}</div>
                    </div>
                    <div class="section-box" style="margin:0; text-align:center;">
                        <div class="dash-hero-label">หน่วยกิตรวม</div>
                        <div class="dash-hero-gpa" style="font-size:32px; color:var(--accent);">${totalCr}</div>
                    </div>
                </div>
                <table class="dash-table">
                    <thead><tr><th>วิชา</th><th>คะแนนสะสม (pts)</th><th>เกรด</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        };

        // ══════════════════════════════════════════════════════════
        // AI VISION IMPORT MODULE
        // ══════════════════════════════════════════════════════════
        const AI_API_KEY = "AIzaSyCQCOBGq_yQSOivgvSp3j2YrkEOHyIn668";

        window.processAIImage = async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('ai-loading').style.display = 'flex';

            try {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64Clean = reader.result.split(',')[1];
                    const promptText = `คุณคือผู้ช่วยจัดการการเรียน วิเคราะห์ภาพเอกสาร/ตารางเรียนนี้เพื่อหา "หมวดหมู่คะแนน" และ "คะแนนที่ได้"
                    ส่งกลับเป็น JSON เท่านั้น รูปแบบ:
                    { "categories": [ { "name": "ชื่อหมวด", "weight": 20, "items": [ { "name": "งาน1", "score": 8, "maxScore": 10 } ] } ] }`;

                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${AI_API_KEY}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ role: "user", parts: [ { text: promptText }, { inlineData: { mimeType: file.type, data: base64Clean } } ] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    if (!response.ok) throw new Error("API Error");
                    const result = await response.json();
                    const textContent = result?.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if(textContent) {
                        const aiData = JSON.parse(textContent);
                        applyAIData(aiData);
                    } else {
                        window.showToast("อ่านรูปไม่สำเร็จ กรุณาลองใหม่", true);
                    }
                    document.getElementById('ai-loading').style.display = 'none';
                    event.target.value = '';
                };
            } catch (e) {
                console.error(e);
                window.showToast("เกิดข้อผิดพลาดของระบบ AI", true);
                document.getElementById('ai-loading').style.display = 'none';
                event.target.value = '';
            }
        };

        function applyAIData(aiData) {
            const s = getSubject(); if (!s) return;
            if (!aiData.categories || aiData.categories.length === 0) { window.showToast('ไม่พบข้อมูลคะแนนในภาพ', true); return; }

            aiData.categories.forEach(cat => {
                const newCat = { id: window.nextId(), name: cat.name || 'AI Category', weight: cat.weight || 0, items: [] };
                (cat.items||[]).forEach(item => {
                    newCat.items.push({ id: window.nextId(), name: item.name||'Item', score: item.score!==null?item.score:'', maxScore: item.maxScore||100, locked: item.score!==null });
                });
                s.categories.push(newCat);
            });
            window.save(); window.renderSubjectView();
            window.showToast("✨ AI นำเข้าข้อมูลสำเร็จ!");
        }

        // Initialize App UI
        window.renderAll();
        if(getSubjects().length > 0) window.showDashboard();
    </script>
</body>
</html>
