    .filter-btn.active .icon-box {

<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS & STATE
// ═══════════════════════════════════════════════════
const MAX_DIM = 2400;

// Per-page data
let pages = [];         // { sourceCanvas, croppedCanvas, processedCanvas, filter, rotation }
let activePage = 0;     // index into pages[]
let editingPageForCrop = -1; // which page we're cropping (-1 = new page)

// Crop state
let cropCorners = [];
let draggingIdx = -1;

// Camera
let currentStream = null, videoTrack = null, isTorchOn = false;
let cameraActive = false;

// ═══════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════
function makeCanvas(w, h) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    return c;
}

function freeCanvas(c) {
    if (!c) return;
    c.width = 0; c.height = 0;
}

function getCtx(c, opts = {}) {
    return c.getContext('2d', { willReadFrequently: true, ...opts });
}

let toastTimer = null;
function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.className = 'show' + (type ? ' ' + type : '');
    el.textContent = msg;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

function showLoading(show, text = 'กำลังประมวลผล...', progress = -1) {
    const el = document.getElementById('loadingScreen');
    const bar = document.getElementById('pdfProgressBar');
    document.getElementById('loadingText').textContent = text;
    if (show) {
        el.classList.remove('hidden', 'fade-out');
        if (progress >= 0) {
            bar.classList.remove('hidden');
            document.getElementById('pdfProgress').style.width = progress + '%';
        } else {
            bar.classList.add('hidden');
        }
    } else {
        el.classList.add('fade-out');
        setTimeout(() => el.classList.add('hidden'), 220);
    }
}

// ═══════════════════════════════════════════════════
//  VIEW CONTROLLER
// ═══════════════════════════════════════════════════
const viewIds = ['viewCamera', 'viewCrop', 'viewEdit'];
function showView(name) {
    viewIds.forEach(id => {
        const el = document.getElementById(id);
        el.classList.add('hidden');
        el.classList.remove('entering');
    });
    const target = document.getElementById('view' + name.charAt(0).toUpperCase() + name.slice(1));
    target.classList.remove('hidden');
    requestAnimationFrame(() => target.classList.add('entering'));

    const btnRestart = document.getElementById('btnRestart');
    btnRestart.classList.toggle('hidden', name === 'camera');

    if (name === 'camera') {
        startCamera();
        updatePageCounter();
    } else if (name === 'crop') {
        stopCamera();
        setupCropView();
    } else if (name === 'edit') {
        renderEditView();
    }
}

function updatePageCounter() {
    const el = document.getElementById('pageCounter');
    if (pages.length > 0) {
        el.textContent = `${pages.length} หน้า`;
        el.classList.remove('hidden');
    } else {
        el.classList.add('hidden');
    }
}

// ═══════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════
async function startCamera() {
    if (cameraActive) return;
    const feed = document.getElementById('cameraFeed');
    const noMsg = document.getElementById('noCameraMsg');

    const constraints = [
        { video: { facingMode: 'environment', width: { ideal: 4032 }, height: { ideal: 3024 } }, audio: false },
        { video: { facingMode: 'environment' }, audio: false },
        { video: true, audio: false }
    ];

    for (const c of constraints) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia(c);
            feed.srcObject = stream;
            currentStream = stream;
            videoTrack = stream.getVideoTracks()[0];
            cameraActive = true;
            noMsg.classList.add('hidden');
            feed.classList.remove('hidden');

            setTimeout(() => {
                try {
                    const caps = videoTrack.getCapabilities?.() || {};
                    document.getElementById('btnTorch').classList.toggle('hidden', !caps.torch);
                } catch (_) {}
            }, 600);
            return;
        } catch (err) {
            console.warn('Camera attempt failed:', err);
        }
    }

    // All attempts failed
    noMsg.classList.remove('hidden');
    feed.classList.add('hidden');
    showToast('ไม่สามารถเข้าถึงกล้องได้', 'error');
}

function stopCamera() {
    if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
        currentStream = null; videoTrack = null; isTorchOn = false; cameraActive = false;
        const btn = document.getElementById('btnTorch');
        btn.innerHTML = '<i class="ph ph-flashlight text-xl"></i>';
        btn.classList.remove('bg-white', 'text-black');
        btn.classList.add('text-white');
    }
}

document.getElementById('btnRetryCamera').addEventListener('click', () => {
    document.getElementById('noCameraMsg').classList.add('hidden');
    startCamera();
});

document.getElementById('btnTorch').addEventListener('click', async () => {
    if (!videoTrack) return;
    isTorchOn = !isTorchOn;
    try {
        await videoTrack.applyConstraints({ advanced: [{ torch: isTorchOn }] });
        const btn = document.getElementById('btnTorch');
        btn.classList.toggle('bg-white', isTorchOn);
        btn.classList.toggle('text-black', isTorchOn);
        btn.classList.toggle('text-white', !isTorchOn);
    } catch (_) {
        showToast('กล้องนี้ไม่รองรับไฟฉาย', 'error');
        isTorchOn = false;
    }
});

// ═══════════════════════════════════════════════════
//  CAPTURE
// ═══════════════════════════════════════════════════
function captureFromVideo() {
    if (!currentStream) { showToast('กล้องยังไม่พร้อม', 'error'); return; }
    const feed = document.getElementById('cameraFeed');
    const vw = feed.videoWidth, vh = feed.videoHeight;
    if (!vw || !vh) { showToast('กล้องยังไม่พร้อม', 'error'); return; }

    const scale = Math.min(1, MAX_DIM / Math.max(vw, vh));
    const src = makeCanvas(Math.round(vw * scale), Math.round(vh * scale));
    getCtx(src).drawImage(feed, 0, 0, src.width, src.height);
    return src;
}

document.getElementById('captureRing').addEventListener('click', () => {
    const src = captureFromVideo();
    if (!src) return;

    // Visual shutter flash
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;inset:0;background:#fff;opacity:0.6;z-index:200;pointer-events:none;transition:opacity 0.3s';
    document.body.appendChild(flash);
    setTimeout(() => { flash.style.opacity = '0'; setTimeout(() => flash.remove(), 320); }, 50);

    showLoading(true, 'กำลังวิเคราะห์โครงสร้างภาพ...');
    editingPageForCrop = -1; // new page
    setTimeout(() => {
        pages.push({ sourceCanvas: src, croppedCanvas: null, processedCanvas: null, filter: 'shadow_remove', rotation: 0 });
        activePage = pages.length - 1;
        showView('crop');
        showLoading(false);
    }, 80);
});

document.getElementById('fileInput').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    showLoading(true, 'กำลังโหลดภาพ...');

    for (const file of files) {
        await new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const scale = Math.min(1, MAX_DIM / Math.max(img.width, img.height));
                const src = makeCanvas(Math.round(img.width * scale), Math.round(img.height * scale));
                getCtx(src).drawImage(img, 0, 0, src.width, src.height);
                pages.push({ sourceCanvas: src, croppedCanvas: null, processedCanvas: null, filter: 'shadow_remove', rotation: 0 });
                URL.revokeObjectURL(img.src);
                resolve();
            };
            img.onerror = () => { showToast('โหลดภาพไม่สำเร็จ', 'error'); resolve(); };
            img.src = URL.createObjectURL(file);
        });
    }

    editingPageForCrop = -1;
    activePage = pages.length - 1;
    showView('crop');
    showLoading(false);
    e.target.value = '';
});

// ═══════════════════════════════════════════════════
//  EDGE DETECTION (Improved: Hough-like Line detection)
// ═══════════════════════════════════════════════════
function detectDocumentCorners(sourceCanvas) {
    const W = 200, H = 200;
    const thumb = makeCanvas(W, H);
    const ctx = getCtx(thumb);
    ctx.drawImage(sourceCanvas, 0, 0, W, H);
    const { data } = ctx.getImageData(0, 0, W, H);

    // Grayscale
    const gray = new Float32Array(W * H);
    for (let i = 0, p = 0; i < data.length; i += 4, p++) {
        gray[p] = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
    }

    // Gaussian blur (3×3) to reduce noise before edge detection
    const blurred = new Float32Array(W * H);
    const kernel = [1,2,1,2,4,2,1,2,1];
    for (let y = 1; y < H-1; y++) {
        for (let x = 1; x < W-1; x++) {
            let sum = 0;
            for (let ky = -1; ky <= 1; ky++)
                for (let kx = -1; kx <= 1; kx++)
                    sum += gray[(y+ky)*W + (x+kx)] * kernel[(ky+1)*3 + (kx+1)];
            blurred[y*W+x] = sum / 16;
        }
    }

    // Sobel edge detection
    const edges = new Float32Array(W * H);
    let maxEdge = 0;
    for (let y = 1; y < H-1; y++) {
        for (let x = 1; x < W-1; x++) {
            const gx =
                -blurred[(y-1)*W+(x-1)] + blurred[(y-1)*W+(x+1)]
                -2*blurred[y*W+(x-1)]   + 2*blurred[y*W+(x+1)]
                -blurred[(y+1)*W+(x-1)] + blurred[(y+1)*W+(x+1)];
            const gy =
                -blurred[(y-1)*W+(x-1)] - 2*blurred[(y-1)*W+x] - blurred[(y-1)*W+(x+1)]
                +blurred[(y+1)*W+(x-1)] + 2*blurred[(y+1)*W+x] + blurred[(y+1)*W+(x+1)];
            const mag = Math.sqrt(gx*gx + gy*gy);
            edges[y*W+x] = mag;
            if (mag > maxEdge) maxEdge = mag;
        }
    }

    // Adaptive threshold (30% of max)
    const threshold = maxEdge * 0.30;
    let minX = W, maxX = 0, minY = H, maxY = 0;
    for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
            if (edges[y*W+x] > threshold) {
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
            }
        }
    }

    freeCanvas(thumb);

    const scaleX = sourceCanvas.width / W;
    const scaleY = sourceCanvas.height / H;

    if (maxX - minX < 25 || maxY - minY < 25) {
        // Fallback: 8% inset
        const px = sourceCanvas.width * 0.08, py = sourceCanvas.height * 0.08;
        return [
            {x: px, y: py}, {x: sourceCanvas.width - px, y: py},
            {x: sourceCanvas.width - px, y: sourceCanvas.height - py},
            {x: px, y: sourceCanvas.height - py}
        ];
    }

    const padX = 6, padY = 6;
    const x0 = Math.max(0, (minX - padX) * scaleX);
    const y0 = Math.max(0, (minY - padY) * scaleY);
    const x1 = Math.min(sourceCanvas.width,  (maxX + padX) * scaleX);
    const y1 = Math.min(sourceCanvas.height, (maxY + padY) * scaleY);

    return [
        {x: x0, y: y0}, {x: x1, y: y0},
        {x: x1, y: y1}, {x: x0, y: y1}
    ];
}

// ═══════════════════════════════════════════════════
//  CROP VIEW
// ═══════════════════════════════════════════════════
function setupCropView() {
    const page = pages[activePage];
    const source = page.sourceCanvas;

    const container = document.getElementById('cropContainer');
    const cw = container.clientWidth - 24;
    const ch = container.clientHeight - 24;
    const ratio = source.width / source.height;
    const contRatio = cw / ch;

    let drawW = ratio > contRatio ? cw : ch * ratio;
    let drawH = ratio > contRatio ? cw / ratio : ch;
    drawW = Math.floor(drawW);
    drawH = Math.floor(drawH);

    const canvas = document.getElementById('cropCanvas');
    canvas.style.width = drawW + 'px';
    canvas.style.height = drawH + 'px';
    canvas.width = source.width;
    canvas.height = source.height;

    cropCorners = detectDocumentCorners(source);
    drawCropUI();
}

function drawCropUI() {
    const canvas = document.getElementById('cropCanvas');
    const ctx = getCtx(canvas);
    const w = canvas.width, h = canvas.height;
    const page = pages[activePage];

    ctx.clearRect(0, 0, w, h);
    ctx.drawImage(page.sourceCanvas, 0, 0);

    // Darken outside selection
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.62)';
    ctx.beginPath();
    ctx.rect(0, 0, w, h);
    ctx.moveTo(cropCorners[0].x, cropCorners[0].y);
    cropCorners.forEach((p, i) => { if (i > 0) ctx.lineTo(p.x, p.y); });
    ctx.closePath();
    ctx.fill('evenodd');
    ctx.restore();

    // Grid inside selection
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cropCorners[0].x, cropCorners[0].y);
    cropCorners.forEach((p, i) => { if (i > 0) ctx.lineTo(p.x, p.y); });
    ctx.closePath();
    ctx.clip();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = w * 0.0015;
    for (let i = 1; i < 3; i++) {
        // horizontal-ish
        const lx = lerp(cropCorners[0].x, cropCorners[3].x, i/3);
        const ly = lerp(cropCorners[0].y, cropCorners[3].y, i/3);
        const rx = lerp(cropCorners[1].x, cropCorners[2].x, i/3);
        const ry = lerp(cropCorners[1].y, cropCorners[2].y, i/3);
        ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(rx, ry); ctx.stroke();
        // vertical-ish
        const tx = lerp(cropCorners[0].x, cropCorners[1].x, i/3);
        const ty = lerp(cropCorners[0].y, cropCorners[1].y, i/3);
        const bx = lerp(cropCorners[3].x, cropCorners[2].x, i/3);
        const by = lerp(cropCorners[3].y, cropCorners[2].y, i/3);
        ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(bx, by); ctx.stroke();
    }
    ctx.restore();

    // Border
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = Math.max(3, w * 0.008);
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(cropCorners[0].x, cropCorners[0].y);
    cropCorners.forEach((p, i) => { if (i > 0) ctx.lineTo(p.x, p.y); });
    ctx.closePath();
    ctx.stroke();

    // Handles
    const R = Math.max(18, w * 0.038);
    cropCorners.forEach((p, i) => {
        ctx.beginPath(); ctx.arc(p.x, p.y, R, 0, Math.PI*2);
        ctx.fillStyle = i === draggingIdx ? '#3b82f6' : 'rgba(255,255,255,0.92)';
        ctx.fill();
        ctx.lineWidth = Math.max(3, w * 0.01);
        ctx.strokeStyle = '#3b82f6';
        ctx.stroke();

        // Inner dot
        ctx.beginPath(); ctx.arc(p.x, p.y, R*0.28, 0, Math.PI*2);
        ctx.fillStyle = i === draggingIdx ? '#fff' : '#3b82f6';
        ctx.fill();
    });
}

function lerp(a, b, t) { return a + (b - a) * t; }

// Touch/Mouse helpers
function getCanvasPos(e) {
    const canvas = document.getElementById('cropCanvas');
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    const touch = e.touches ? e.touches[0] : e;
    return {
        x: (touch.clientX - rect.left) * sx,
        y: (touch.clientY - rect.top) * sy,
        clientX: touch.clientX,
        clientY: touch.clientY
    };
}

function onDragStart(e) {
    e.preventDefault();
    const pos = getCanvasPos(e);
    const canvas = document.getElementById('cropCanvas');
    const hitR2 = Math.pow(canvas.width * 0.12, 2);

    let minD = Infinity; draggingIdx = -1;
    cropCorners.forEach((c, i) => {
        const d = (c.x-pos.x)**2 + (c.y-pos.y)**2;
        if (d < minD && d < hitR2) { minD = d; draggingIdx = i; }
    });
    if (draggingIdx !== -1) showMagnifier(pos);
}

function onDragMove(e) {
    if (draggingIdx === -1) return;
    e.preventDefault();
    const pos = getCanvasPos(e);
    const canvas = document.getElementById('cropCanvas');
    cropCorners[draggingIdx] = {
        x: Math.max(0, Math.min(canvas.width, pos.x)),
        y: Math.max(0, Math.min(canvas.height, pos.y))
    };
    requestAnimationFrame(drawCropUI);
    showMagnifier(pos);
}

function onDragEnd() {
    draggingIdx = -1;
    document.getElementById('magnifier').style.display = 'none';
}

function showMagnifier(pos) {
    const mag = document.getElementById('magnifier');
    const wrapper = document.getElementById('cropWrapper');
    const wRect = wrapper.getBoundingClientRect();
    const canvas = document.getElementById('cropCanvas');

    mag.style.display = 'block';
    // Position: above finger, centered
    const mx = pos.clientX - wRect.left - 60;
    const my = pos.clientY - wRect.top - 150;
    mag.style.left = Math.max(0, Math.min(wRect.width - 120, mx)) + 'px';
    mag.style.top = Math.max(0, my) + 'px';

    // Draw zoomed content
    const magCtx = document.getElementById('magCanvas').getContext('2d');
    const zoom = 2.8;
    const sW = 120 / zoom, sH = 120 / zoom;
    const sx = pos.x - sW/2, sy = pos.y - sH/2;
    magCtx.clearRect(0, 0, 120, 120);
    magCtx.drawImage(pages[activePage].sourceCanvas, sx, sy, sW, sH, 0, 0, 120, 120);
}

const cropCanvas = document.getElementById('cropCanvas');
cropCanvas.addEventListener('mousedown', onDragStart);
cropCanvas.addEventListener('mousemove', onDragMove);
window.addEventListener('mouseup', onDragEnd);
cropCanvas.addEventListener('touchstart', onDragStart, {passive: false});
cropCanvas.addEventListener('touchmove', onDragMove, {passive: false});

// Rotation in crop view
document.getElementById('btnRotateCW').addEventListener('click', () => rotateSource(90));

function rotateSource(deg) {
    const page = pages[activePage];
    const src = page.sourceCanvas;
    const rad = deg * Math.PI / 180;
    const newW = Math.abs(Math.round(src.width * Math.cos(rad))) + Math.abs(Math.round(src.height * Math.sin(rad)));
    const newH = Math.abs(Math.round(src.width * Math.sin(rad))) + Math.abs(Math.round(src.height * Math.cos(rad)));
    const rotated = makeCanvas(newW, newH);
    const ctx = getCtx(rotated);
    ctx.translate(newW/2, newH/2);
    ctx.rotate(rad);
    ctx.drawImage(src, -src.width/2, -src.height/2);
    freeCanvas(page.sourceCanvas);
    page.sourceCanvas = rotated;
    page.rotation = ((page.rotation || 0) + deg + 360) % 360;
    setupCropView();
}

// ═══════════════════════════════════════════════════
//  PERSPECTIVE WARP (Bilinear Interpolation)
// ═══════════════════════════════════════════════════
function warpPerspective(pageIdx) {
    const page = pages[pageIdx];
    const [tl, tr, br, bl] = cropCorners;

    const outW = Math.round(Math.max(Math.hypot(tr.x-tl.x, tr.y-tl.y), Math.hypot(br.x-bl.x, br.y-bl.y)));
    const outH = Math.round(Math.max(Math.hypot(tl.x-bl.x, tl.y-bl.y), Math.hypot(tr.x-br.x, tr.y-br.y)));

    if (outW < 4 || outH < 4) return;

    if (page.croppedCanvas) freeCanvas(page.croppedCanvas);
    const dst = makeCanvas(outW, outH);
    const dstCtx = getCtx(dst);
    const dstData = dstCtx.createImageData(outW, outH);
    const dstBuf = dstData.data;

    const srcCtx = getCtx(page.sourceCanvas);
    const srcData = srcCtx.getImageData(0, 0, page.sourceCanvas.width, page.sourceCanvas.height);
    const srcBuf = srcData.data;
    const srcW = page.sourceCanvas.width;
    const srcH = page.sourceCanvas.height;

    // Bilinear interpolation (anti-aliased)
    for (let y = 0; y < outH; y++) {
        const v = y / (outH - 1);
        const lx = tl.x + (bl.x - tl.x) * v, ly = tl.y + (bl.y - tl.y) * v;
        const rx = tr.x + (br.x - tr.x) * v, ry = tr.y + (br.y - tr.y) * v;
        for (let x = 0; x < outW; x++) {
            const u = x / (outW - 1);
            const sx = lx + (rx - lx) * u;
            const sy = ly + (ry - ly) * u;

            // Bilinear sample
            const sx0 = Math.floor(sx), sy0 = Math.floor(sy);
            const sx1 = Math.min(sx0+1, srcW-1), sy1 = Math.min(sy0+1, srcH-1);
            const fx = sx - sx0, fy = sy - sy0;

            if (sx0 < 0 || sy0 < 0 || sx0 >= srcW || sy0 >= srcH) continue;

            const i00 = (sy0*srcW + sx0)*4;
            const i10 = (sy0*srcW + sx1)*4;
            const i01 = (sy1*srcW + sx0)*4;
            const i11 = (sy1*srcW + sx1)*4;
            const di = (y*outW + x)*4;

            for (let c = 0; c < 3; c++) {
                dstBuf[di+c] = Math.round(
                    srcBuf[i00+c]*(1-fx)*(1-fy) +
                    srcBuf[i10+c]*fx*(1-fy) +
                    srcBuf[i01+c]*(1-fx)*fy +
                    srcBuf[i11+c]*fx*fy
                );
            }
            dstBuf[di+3] = 255;
        }
    }

    dstCtx.putImageData(dstData, 0, 0);
    page.croppedCanvas = dst;
}

// ═══════════════════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════════════════
function applyFilter(pageIdx, filterName) {
    const page = pages[pageIdx];
    if (!page.croppedCanvas) return;
    page.filter = filterName;

    if (page.processedCanvas) freeCanvas(page.processedCanvas);
    const w = page.croppedCanvas.width, h = page.croppedCanvas.height;
    const dst = makeCanvas(w, h);
    const ctx = getCtx(dst);
    ctx.drawImage(page.croppedCanvas, 0, 0);

    if (filterName === 'original') {
        page.processedCanvas = dst;
        return;
    }

    const imgData = ctx.getImageData(0, 0, w, h);
    const d = imgData.data;

    if (filterName === 'shadow_remove') {
        // Local Adaptive Normalization — downsample to create lighting map
        const blurW = Math.max(8, Math.floor(w / 28));
        const blurH = Math.max(8, Math.floor(h / 28));
        const small = makeCanvas(blurW, blurH);
        getCtx(small).drawImage(page.croppedCanvas, 0, 0, blurW, blurH);
        const big = makeCanvas(w, h);
        const bCtx = getCtx(big);
        bCtx.imageSmoothingEnabled = true;
        bCtx.imageSmoothingQuality = 'high';
        bCtx.drawImage(small, 0, 0, w, h);
        const bg = bCtx.getImageData(0, 0, w, h).data;
        freeCanvas(small); freeCanvas(big);

        for (let i = 0; i < d.length; i += 4) {
            const luma = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
            let bgL = bg[i]*0.299 + bg[i+1]*0.587 + bg[i+2]*0.114;
            if (bgL < 1) bgL = 1;
            let corrected = (luma / bgL) * 255;
            if (corrected > 208) corrected = 255;
            else corrected = Math.max(0, (corrected - 115) * 1.85);
            d[i] = d[i+1] = d[i+2] = Math.min(255, corrected);
        }
    }
    else if (filterName === 'magic_color') {
        for (let i = 0; i < d.length; i += 4) {
            const luma = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
            const boost = 1.35;
            d[i]   = clamp((d[i]   - 128)*boost + 148);
            d[i+1] = clamp((d[i+1] - 128)*boost + 148);
            d[i+2] = clamp((d[i+2] - 128)*boost + 148);
            if (luma > 185) { d[i]=255; d[i+1]=255; d[i+2]=255; }
        }
    }
    else if (filterName === 'bw') {
        for (let i = 0; i < d.length; i += 4) {
            let v = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
            // Otsu-like threshold: strong binarize
            v = v > 140 ? 255 : 0;
            d[i] = d[i+1] = d[i+2] = v;
        }
    }
    else if (filterName === 'enhance') {
        // Unsharp mask approximation via downscale diff
        const blurW = Math.max(8, Math.floor(w / 20));
        const blurH = Math.max(8, Math.floor(h / 20));
        const small = makeCanvas(blurW, blurH);
        getCtx(small).drawImage(page.croppedCanvas, 0, 0, blurW, blurH);
        const big = makeCanvas(w, h);
        const bCtx = getCtx(big);
        bCtx.imageSmoothingEnabled = true;
        bCtx.imageSmoothingQuality = 'high';
        bCtx.drawImage(small, 0, 0, w, h);
        const blur = bCtx.getImageData(0, 0, w, h).data;
        freeCanvas(small); freeCanvas(big);

        const strength = 1.8;
        for (let i = 0; i < d.length; i += 4) {
            for (let c = 0; c < 3; c++) {
                d[i+c] = clamp(d[i+c] + (d[i+c] - blur[i+c]) * strength);
            }
        }
    }

    ctx.putImageData(imgData, 0, 0);
    page.processedCanvas = dst;
}

function clamp(v) { return Math.max(0, Math.min(255, Math.round(v))); }

// ═══════════════════════════════════════════════════
//  EDIT VIEW
// ═══════════════════════════════════════════════════
let currentFilter = 'shadow_remove';

function renderEditView() {
    const page = pages[activePage];
    if (!page || !page.processedCanvas) return;

    currentFilter = page.filter;

    // Sync active filter button
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === currentFilter);
    });

    // Preview
    const prev = document.getElementById('previewCanvas');
    prev.width = page.processedCanvas.width;
    prev.height = page.processedCanvas.height;
    getCtx(prev).drawImage(page.processedCanvas, 0, 0);

    // Badge
    const badge = document.getElementById('editPageBadge');
    if (pages.length > 1) {
        badge.textContent = `หน้า ${activePage+1} / ${pages.length}`;
        badge.classList.remove('hidden');
    } else {
        badge.classList.add('hidden');
    }

    // Thumbnails
    renderThumbs();
    updatePageCounter();
}

function renderThumbs() {
    const strip = document.getElementById('thumbStrip');
    if (pages.length <= 1) { strip.classList.add('hidden'); return; }
    strip.classList.remove('hidden');
    strip.innerHTML = '';

    pages.forEach((p, i) => {
        if (!p.processedCanvas) return;
        const wrapper = document.createElement('div');
        wrapper.className = 'thumb-item';

        const img = document.createElement('canvas');
        const scale = 56 / p.processedCanvas.height;
        img.width = Math.round(p.processedCanvas.width * scale);
        img.height = 56;
        img.style.cssText = `width:${img.width}px;height:56px;border-radius:6px;cursor:pointer;border:2px solid ${i===activePage ? '#3b82f6':'rgba(255,255,255,0.15)'}`;
        img.getContext('2d').drawImage(p.processedCanvas, 0, 0, img.width, img.height);
        img.addEventListener('click', () => { activePage = i; renderEditView(); });

        const del = document.createElement('button');
        del.className = 'del-btn';
        del.innerHTML = '<i class="ph ph-x" style="font-size:10px;color:#fff"></i>';
        del.addEventListener('click', (e) => {
            e.stopPropagation();
            freeCanvas(pages[i].sourceCanvas);
            freeCanvas(pages[i].croppedCanvas);
            freeCanvas(pages[i].processedCanvas);
            pages.splice(i, 1);
            if (pages.length === 0) { showView('camera'); return; }
            activePage = Math.min(activePage, pages.length - 1);
            renderEditView();
        });

        wrapper.appendChild(img);
        wrapper.appendChild(del);
        strip.appendChild(wrapper);
    });

    // Add page button in thumb strip
    const addBtn = document.createElement('button');
    addBtn.className = 'w-[44px] h-[56px] rounded-lg bg-gray-800/60 border border-white/10 flex items-center justify-center text-gray-400 shrink-0';
    addBtn.innerHTML = '<i class="ph ph-plus text-lg"></i>';
    addBtn.addEventListener('click', () => showView('camera'));
    strip.appendChild(addBtn);
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const filter = btn.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        showLoading(true, 'กำลังประมวลผลฟิลเตอร์...');
        setTimeout(() => {
            applyFilter(activePage, filter);
            renderEditView();
            showLoading(false);
        }, 30);
    });
});

// ═══════════════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════════════
document.getElementById('btnSaveImg').addEventListener('click', () => {
    const page = pages[activePage];
    if (!page?.processedCanvas) { showToast('ไม่มีภาพสำหรับบันทึก', 'error'); return; }
    try {
        const link = document.createElement('a');
        link.download = `scan_${Date.now()}.jpg`;
        link.href = page.processedCanvas.toDataURL('image/jpeg', 0.95);
        link.click();
        showToast('บันทึกรูปภาพสำเร็จ ✓', 'success');
    } catch(e) {
        showToast('บันทึกไม่สำเร็จ: ' + e.message, 'error');
    }
});

document.getElementById('btnSavePdf').addEventListener('click', async () => {
    const validPages = pages.filter(p => p.processedCanvas);
    if (!validPages.length) { showToast('ไม่มีเอกสารสำหรับสร้าง PDF', 'error'); return; }

    showLoading(true, `กำลังสร้าง PDF (0/${validPages.length})...`, 0);

    await new Promise(resolve => setTimeout(resolve, 80));

    try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const pw = pdf.internal.pageSize.getWidth();
        const ph = pdf.internal.pageSize.getHeight();

        for (let i = 0; i < validPages.length; i++) {
            const p = validPages[i].processedCanvas;
            if (i > 0) pdf.addPage();

            const ratio = p.width / p.height;
            let iw = pw - 10, ih = (pw - 10) / ratio;
            if (ih > ph - 10) { ih = ph - 10; iw = ih * ratio; }

            // Use progressive JPEG for large images
            const quality = p.width * p.height > 2000*2000 ? 0.78 : 0.88;
            pdf.addImage(p.toDataURL('image/jpeg', quality), 'JPEG',
                (pw - iw) / 2, (ph - ih) / 2, iw, ih, undefined, 'FAST');

            const pct = Math.round(((i+1) / validPages.length) * 100);
            showLoading(true, `กำลังสร้าง PDF (${i+1}/${validPages.length})...`, pct);
            await new Promise(r => setTimeout(r, 10));
        }

        pdf.save(`scan_${Date.now()}.pdf`);
        showLoading(false);
        showToast(`สร้าง PDF ${validPages.length} หน้า สำเร็จ ✓`, 'success');
    } catch(e) {
        showLoading(false);
        showToast('สร้าง PDF ไม่สำเร็จ: ' + e.message, 'error');
        console.error(e);
    }
});
